    - name: "Hallway Downstairs Occupied"
      unique_id: hallway_downstairs_occupied
      state_topic: "hallway_downstairs/occupied/state"
    - name: "Hallway Upstairs Occupied"
      unique_id: hallway_upstairs_occupied
      state_topic: "hallway_upstairs/occupied/state"
    - name: "Kitchen Occupied"
      unique_id: kitchen_occupied
      state_topic: "kitchen/occupied/state"
    - name: "Bedroom Occupied"
      unique_id: bedroom_occupied
      state_topic: "bedroom/occupied/state"
    - name: "Bathroom Occupied"
      unique_id: bathroom_occupied
      state_topic: "bathroom/occupied/state"
    - name: "Home Office Occupied"
      unique_id: home_office_occupied
      state_topic: "home_office/occupied/state"
    - name: "Foreign Office Occupied"
      unique_id: foreign_office_occupied
      state_topic: "foreign_office/occupied/state"

    # Room contained trackers
    - name: "Parlour Occupied Contained"
      unique_id: "parlour_occupied_contained"
      state_topic: "parlour/occupied/contained/state"
    - name: "Hallway Downstairs Occupied Contained"
      unique_id: "hallway_downstairs_occupied_contained"
      state_topic: "hallway_downstairs/occupied/contained/state"
    - name: "Hallway Upstairs Occupied Contained"
      unique_id: "hallway_upstairs_occupied_contained"
      state_topic: "hallway_upstairs/occupied/contained/state"
    - name: "Kitchen Occupied Contained"
      unique_id: "kitchen_occupied_contained"
      state_topic: "kitchen/occupied/contained/state"
    - name: "Bedroom Occupied Contained"
      unique_id: "bedroom_occupied_contained"
      state_topic: "bedroom/occupied/contained/state"
    - name: "Bathroom Occupied Contained"
      unique_id: "bathroom_occupied_contained"
      state_topic: "bathroom/occupied/contained/state"
    - name: "Home Office Occupied Contained"
      unique_id: "home_office_occupied_contained"
      state_topic: "home_office/occupied/contained/state"
    - name: "Foreign Office Occupied Contained"
      unique_id: "foreign_office_occupied_contained"
      state_topic: "foreign_office/occupied/contained/state"

    # Recent Auto Off Light Trackers
    - name: "Parlour Lighting Recent Auto Off"
      unique_id: "parlour_lighting_recent_auto_off"
      state_topic: "parlour/lighting/recent_auto_off"
    - name: "Hallway Downstairs Lighting Recent Auto Off"
      unique_id: "hallway_downstairs_recent_auto_off"
      state_topic: "hallway_downstairs/lighting/recent_auto_off"
    - name: "Hallway Upstairs Lighting Recent Auto Off"
      unique_id: "hallway_upstairs_lighting_recent_auto_off"
      state_topic: "hallway_upstairs/lighting/recent_auto_off"
    - name: "Kitchen Lighting Recent Auto Off"
      unique_id: "kitchen_lighting_recent_auto_off"
      state_topic: "kitchen/lighting/recent_auto_off"
    - name: "Bedroom Lighting Recent Auto Off"
      unique_id: "bedroom_lighting_recent_auto_off"
      state_topic: "bedroom/lighting/recent_auto_off"
    - name: "Bathroom Lighting Recent Auto Off"
      unique_id: "bathroom_lighting_recent_auto_off"
      state_topic: "bathroom/lighting/recent_auto_off"
    - name: "Home Office Lighting Recent Auto Off"
      unique_id: "home_office_lighting_recent_auto_off"
      state_topic: "home_office/lighting/recent_auto_off"
    - name: "Foreign Office Lighting Recent Auto Off"
      unique_id: "foreign_office_lighting_recent_auto_off"
      state_topic: "foreign_office/lighting/recent_auto_off"

    # Latch Devices
    - name: "Parlour Piano"
      unique_id: parlour_piano
      state_topic: "parlour/piano/state"
    - name: "Bathroom Shower"
      unique_id: bathroom_shower
      state_topic: "bathroom/shower/state"

    # Test Sensors for Validation
    - name: "Test Location Occupied"
      unique_id: test_location_occupied
      state_topic: "test_location/occupied/state"
    - name: "Test Location Sensor Motion Occupancy"
      unique_id: test_location_sensor_motion_occupancy
      state_topic: "test_location/motion/state"
