mqtt:
  sensor:
    - name: "House Active Mode"
      unique_id: house_active_mode
      state_topic: "house/mode/active"

    # Active Heating Topics
    - name: "Parlour Active Heating"
      unique_id: parlour_active_heating
      state_topic: "parlour/heating/active"
    - name: "Hallway Downstairs Active Heating"
      unique_id: hallway_downstairs_active_heating
      state_topic: "hallway_downstairs/heating/active"
    - name: "Kitchen Active Heating"
      unique_id: kitchen_active_heating
      state_topic: "kitchen/heating/active"
    - name: "Bedroom Active Heating"
      unique_id: bedroom_active_heating
      state_topic: "bedroom/heating/active"
    - name: "Bathroom Active Heating"
      unique_id: bathroom_active_heating
      state_topic: "bathroom/heating/active"
    - name: "Home Office Active Heating"
      unique_id: home_office_active_heating
      state_topic: "home_office/heating/active"
    - name: "Foreign Office Active Heating"
      unique_id: foreign_office_active_heating
      state_topic: "foreign_office/heating/active"

    # Heating Source Topics (why the active mode was chosen)
    - name: "Parlour Heating Source"
      unique_id: parlour_heating_source
      state_topic: "parlour/heating/source"
    - name: "Hallway Downstairs Heating Source"
      unique_id: hallway_downstairs_heating_source
      state_topic: "hallway_downstairs/heating/source"
    - name: "Kitchen Heating Source"
      unique_id: kitchen_heating_source
      state_topic: "kitchen/heating/source"
    - name: "Bedroom Heating Source"
      unique_id: bedroom_heating_source
      state_topic: "bedroom/heating/source"
    - name: "Bathroom Heating Source"
      unique_id: bathroom_heating_source
      state_topic: "bathroom/heating/source"
    - name: "Home Office Heating Source"
      unique_id: home_office_heating_source
      state_topic: "home_office/heating/source"
    - name: "Foreign Office Heating Source"
      unique_id: foreign_office_heating_source
      state_topic: "foreign_office/heating/source"

    # Occupied Decision Helpers (per room)
    - name: "Parlour Occupied Decision"
      unique_id: parlour_occupied_decision
      state_topic: "parlour/occupied/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "parlour/occupied/decision"

    - name: "Kitchen Occupied Decision"
      unique_id: kitchen_occupied_decision
      state_topic: "kitchen/occupied/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "kitchen/occupied/decision"

    - name: "Hallway Downstairs Occupied Decision"
      unique_id: hallway_downstairs_occupied_decision
      state_topic: "hallway_downstairs/occupied/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "hallway_downstairs/occupied/decision"

    - name: "Hallway Upstairs Occupied Decision"
      unique_id: hallway_upstairs_occupied_decision
      state_topic: "hallway_upstairs/occupied/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "hallway_upstairs/occupied/decision"

    - name: "Bedroom Occupied Decision"
      unique_id: bedroom_occupied_decision
      state_topic: "bedroom/occupied/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "bedroom/occupied/decision"

    - name: "Bathroom Occupied Decision"
      unique_id: bathroom_occupied_decision
      state_topic: "bathroom/occupied/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "bathroom/occupied/decision"

    - name: "Home Office Occupied Decision"
      unique_id: home_office_occupied_decision
      state_topic: "home_office/occupied/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "home_office/occupied/decision"

    - name: "Foreign Office Occupied Decision"
      unique_id: foreign_office_occupied_decision
      state_topic: "foreign_office/occupied/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "foreign_office/occupied/decision"

    # Lighting Decision Helpers (per room)
    - name: "Parlour Lighting Decision"
      unique_id: parlour_lighting_decision
      state_topic: "parlour/lighting/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "parlour/lighting/decision"

    - name: "Kitchen Lighting Decision"
      unique_id: kitchen_lighting_decision
      state_topic: "kitchen/lighting/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "kitchen/lighting/decision"

    - name: "Hallway Downstairs Lighting Decision"
      unique_id: hallway_downstairs_lighting_decision
      state_topic: "hallway_downstairs/lighting/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "hallway_downstairs/lighting/decision"

    - name: "Hallway Upstairs Lighting Decision"
      unique_id: hallway_upstairs_lighting_decision
      state_topic: "hallway_upstairs/lighting/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "hallway_upstairs/lighting/decision"

    - name: "Bedroom Lighting Decision"
      unique_id: bedroom_lighting_decision
      state_topic: "bedroom/lighting/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "bedroom/lighting/decision"

    - name: "Bathroom Lighting Decision"
      unique_id: bathroom_lighting_decision
      state_topic: "bathroom/lighting/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "bathroom/lighting/decision"

    - name: "Home Office Lighting Decision"
      unique_id: home_office_lighting_decision
      state_topic: "home_office/lighting/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "home_office/lighting/decision"

    - name: "Foreign Office Lighting Decision"
      unique_id: foreign_office_lighting_decision
      state_topic: "foreign_office/lighting/decision"
      value_template: "{{ value_json.decision }}"
      json_attributes_topic: "foreign_office/lighting/decision"

    # Hildebrand Glow — smart meter live data
    - name: "Glow Electricity Power"
      unique_id: glow_electricity_power
      state_topic: "glow/F008D1ECE254/SENSOR/electricitymeter"
      value_template: "{{ value_json.electricitymeter.power.value }}"
      unit_of_measurement: "kW"
      device_class: power
      state_class: measurement

    - name: "Glow Electricity Today"
      unique_id: glow_electricity_today
      state_topic: "glow/F008D1ECE254/SENSOR/electricitymeter"
      value_template: "{{ value_json.electricitymeter.energy.import.day }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

    - name: "Glow Electricity Week"
      unique_id: glow_electricity_week
      state_topic: "glow/F008D1ECE254/SENSOR/electricitymeter"
      value_template: "{{ value_json.electricitymeter.energy.import.week }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

    - name: "Glow Electricity Month"
      unique_id: glow_electricity_month
      state_topic: "glow/F008D1ECE254/SENSOR/electricitymeter"
      value_template: "{{ value_json.electricitymeter.energy.import.month }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

    - name: "Glow Gas Today"
      unique_id: glow_gas_today
      state_topic: "glow/F008D1ECE254/SENSOR/gasmeter"
      value_template: "{{ value_json.gasmeter.energy.import.day }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

    - name: "Glow Gas Week"
      unique_id: glow_gas_week
      state_topic: "glow/F008D1ECE254/SENSOR/gasmeter"
      value_template: "{{ value_json.gasmeter.energy.import.week }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

    - name: "Glow Gas Month"
      unique_id: glow_gas_month
      state_topic: "glow/F008D1ECE254/SENSOR/gasmeter"
      value_template: "{{ value_json.gasmeter.energy.import.month }}"
      unit_of_measurement: "kWh"
      device_class: energy
      state_class: total_increasing

  binary_sensor:
    # Occupancy Topics
    - name: "Parlour Occupied"
      unique_id: parlour_occupied
