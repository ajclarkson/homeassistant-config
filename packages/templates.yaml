template:
  # Active Scene Sensors
  # Stateless templates: find the most recently activated scene per room by last_changed.
  # New scenes are picked up automatically as long as they follow the scene.{room}_ prefix.
  - sensor:
      - name: "Parlour Active Scene"
        unique_id: parlour_active_scene
        state: >
          {% set ns = namespace(latest='', t=as_datetime('1970-01-01T00:00:00+00:00')) %}
          {% for s in states.scene %}
            {% if s.entity_id.startswith('scene.parlour_') and s.last_changed > ns.t %}
              {% set ns.t = s.last_changed %}
              {% set ns.latest = s.entity_id | replace('scene.', '') %}
            {% endif %}
          {% endfor %}
          {{ ns.latest }}

      - name: "Hallway Downstairs Active Scene"
