  # Octopus Agile Helpers
  - sensor:
      - name: "Bin Collection Min Days"
        unique_id: bin_collection_min_days
        state: >
          {{ [
            states('sensor.st_albans_collect_domestic_food_days_until_collection') | int(99),
            states('sensor.st_albans_collect_domestic_paid_garden_days_until_collection') | int(99),
            states('sensor.st_albans_collect_domestic_recycling_days_until_collection') | int(99),
            states('sensor.st_albans_collect_domestic_refuse_days_until_collection') | int(99)
          ] | min }}
        unit_of_measurement: days
        icon: mdi:delete-clock

      - name: "Cheapest 2h Waking Start"
        icon: mdi:clock-start
        state: >
          {% set t = state_attr('binary_sensor.octopus_energy_target_cheapest_2h_waking_hours','next_time') %}
          {% if t %}
            {{ as_local(as_datetime(t)).strftime('%H:%M') }}
          {% else %}
            unknown
          {% endif %}

      - name: "Cheapest 2h Waking End"
        icon: mdi:clock-end
        state: >
          {% set t = state_attr('binary_sensor.octopus_energy_target_cheapest_2h_waking_hours','next_time') %}
          {% set dur = state_attr('binary_sensor.octopus_energy_target_cheapest_2h_waking_hours','next_duration_in_hours') | float(0) %}
          {% if t and dur > 0 %}
            {{ (as_local(as_datetime(t)) + timedelta(hours=dur)).strftime('%H:%M') }}
          {% else %}
            unknown
          {% endif %}

      - name: "Cheapest 2h Waking Avg Rate"
        icon: mdi:currency-gbp
        unit_of_measurement: "p/kWh"
        state: >
          {% set v = state_attr('binary_sensor.octopus_energy_target_cheapest_2h_waking_hours','next_average_value') | float(none) %}
          {% if v is not none %}
            {{ (v * 100) | round(2) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Octopus Today Negative Windows"
        unique_id: octopus_today_negative_windows
        icon: mdi:lightning-bolt
        state: >
          {% set src = 'sensor.target_timeframes_octopus_energy_24e8140196_1012483035417_data_source_last_updated' %}
          {% set slots = state_attr(src, 'data') or [] %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set q = namespace(items=[]) %}
          {% for slot in slots | sort(attribute='start') %}
            {% set sl = as_local(slot.start) %}
            {% if sl.strftime('%Y-%m-%d') == today and slot.value | float(0) < 0 %}
              {% set q.items = q.items + [slot] %}
            {% endif %}
          {% endfor %}
          {% if q.items | length == 0 %}
            —
          {% else %}
            {% set ns = namespace(windows=[], ws=none, we=none, wr=[]) %}
            {% for slot in q.items %}
              {% set s = as_local(slot.start) %}
              {% set e = as_local(slot.end) %}
              {% if ns.ws is none %}
                {% set ns.ws = s %}{% set ns.we = e %}{% set ns.wr = [slot.value | float] %}
              {% elif s == ns.we %}
                {% set ns.we = e %}{% set ns.wr = ns.wr + [slot.value | float] %}
              {% else %}
                {% set avg = (ns.wr | sum / ns.wr | length * 100) | round(1) %}
                {% set ns.windows = ns.windows + [ns.ws.strftime('%H:%M') ~ '–' ~ ns.we.strftime('%H:%M') ~ ' (' ~ avg ~ 'p)'] %}
                {% set ns.ws = s %}{% set ns.we = e %}{% set ns.wr = [slot.value | float] %}
              {% endif %}
            {% endfor %}
            {% set avg = (ns.wr | sum / ns.wr | length * 100) | round(1) %}
            {% set ns.windows = ns.windows + [ns.ws.strftime('%H:%M') ~ '–' ~ ns.we.strftime('%H:%M') ~ ' (' ~ avg ~ 'p)'] %}
            {{ ns.windows | join(' · ') }}
          {% endif %}

      - name: "Octopus Today Cheap Windows"
        unique_id: octopus_today_cheap_windows
        icon: mdi:tag-outline
        state: >
          {% set src = 'sensor.target_timeframes_octopus_energy_24e8140196_1012483035417_data_source_last_updated' %}
          {% set slots = state_attr(src, 'data') or [] %}
          {% set today = now().strftime('%Y-%m-%d') %}
          {% set q = namespace(items=[]) %}
          {% for slot in slots | sort(attribute='start') %}
