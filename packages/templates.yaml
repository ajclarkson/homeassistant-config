            {% set v = slot.value | float(99) %}
            {% if sl.strftime('%Y-%m-%d') == today and v >= 0 and v < 0.10 %}
              {% set q.items = q.items + [slot] %}
            {% endif %}
          {% endfor %}
          {% if q.items | length == 0 %}
