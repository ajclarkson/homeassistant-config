input_number:
    # Heating Temperatures
    global_temperature_minimum:
        name: Global Minimum Temperature
        min: 0
        max: 25
        step: 0.5
    global_temperature_baseline_night:
        name: Global Baseline Night Temperature
        min: 0
        max: 25
        step: 0.5
    global_temperature_baseline_day:
        name: Global Baseline Day Temperature
        min: 0
        max: 25
        step: 0.5
    global_temperature_comfort:
        name: Global Comfort Temperature
        min: 0
        max: 25
        step: 0.5

    # Lux Settings Per Room
    parlour_automation_lux_threshold_dark:
        name: Parlour Lux Threshold Dark
        min: 0
        max: 500
        step: 1
        mode: box
    hallway_downstairs_automation_lux_threshold_dark:
        name: Hallway Downstairs Lux Threshold Dark
        min: 0
        max: 500
        step: 1
        mode: box
    hallway_upstairs_automation_lux_threshold_dark:
        name: Hallway Upstairs Lux Threshold Dark
        min: 0
        max: 500
        step: 1
        mode: box
    kitchen_automation_lux_threshold_dark:
        name: Kitchen Lux Threshold Dark
        min: 0
        max: 500
        step: 1
        mode: box
    bedroom_automation_lux_threshold_dark:
        name: Bedroom Lux Threshold Dark
        min: 0
        max: 500
        step: 1
        mode: box
    bathroom_automation_lux_threshold_dark:
        name: Bathroom Lux Threshold Dark
        min: 0
        max: 500
        step: 1
        mode: box
    home_office_automation_lux_threshold_dark:
        name: Home Office Lux Threshold Dark
        min: 0
        max: 500
        step: 1
        mode: box
    foreign_office_automation_lux_threshold_dark:
        name: Foreign Office Lux Threshold Dark
        min: 0
        max: 500
        step: 1
        mode: box

    # Window Thermal Management
    bedroom_automation_window_frame_threshold:
        name: Bedroom Window Frame Threshold
        min: 20
        max: 60
        step: 0.5
        unit_of_measurement: "°C"
    bedroom_automation_window_open_delta:
        name: Bedroom Window Open Delta
        min: 0.5
        max: 10
        step: 0.5
        unit_of_measurement: "°C"
    bedroom_automation_window_open_hour:
        name: Bedroom Window Open Hour
        min: 12
        max: 22
        step: 1
    bedroom_automation_window_indoor_comfort_threshold:
        name: Bedroom Window Indoor Comfort Threshold
        min: 18
        max: 28
        step: 0.5
        unit_of_measurement: "°C"

    # Foreign Office Door Ventilation
    foreign_office_automation_door_open_delta:
        name: Foreign Office Door Open Delta
        min: 0.5
        max: 10
        step: 0.5
        unit_of_measurement: "°C"
    foreign_office_automation_door_notification_cooldown_mins:
        name: Foreign Office Door Notification Cooldown
        min: 15
        max: 240
        step: 15
        unit_of_measurement: "min"

