
# ── climate_settings_popup ──────────────────────────────────────────
climate_settings_popup:
  card:
    type: custom:bubble-card
    card_type: pop-up
    hash: '#climate_settings'
    show_header: false
    cards:
      - type: custom:paper-buttons-row
        styles:
          justify-content: flex-start
          margin: 20px 12px 8px 12px
        buttons:
          - layout: name
            name: Heating settings
            styles:
              name:
                font-size: 22px
                font-weight: 700
                letter-spacing: -0.3px
                color: var(--primary-text-color)
              button:
                padding: 0
                background: none
      - type: grid
        columns: 1
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: input_boolean.house_heating_enabled
            primary: Central heating
            icon: >
              {{ 'm3of:mode-heat' if is_state('input_boolean.house_heating_enabled', 'on') else 'mdi:radiator-off' }}
            icon_color: >
              {% if is_state('input_boolean.house_heating_enabled', 'on') %}var(--md-sys-color-primary){% else %}rgba(255,255,255,0.45){% endif %}
            layout: horizontal
            tap_action:
              action: toggle
            hold_action:
              action: more-info
            card_mod:
              style:
                .: |
                  ha-card {
                    border-radius: 8px;
                    border: none;
                    background: {% if is_state('input_boolean.house_heating_enabled', 'on') %}color-mix(in srgb, var(--md-sys-color-primary) 10%, var(--md-sys-color-surface-container-high)){% else %}var(--md-sys-color-surface-container-high){% endif %};
                    box-shadow: none;
                    padding: 0;
                    --icon-size: 18px;
                    --shape-color: transparent;
                    --shape-border-radius: 0px;
                    --spacing: 10px;
                  }
                  ha-card:active { transform: scale(0.99); }
                ha-tile-icon$: |
                  .container::before { background: transparent !important; }
                mushroom-state-item$: |
                  .container { padding: 10px 14px; gap: 12px; }
                mushroom-primary-info$: |
                  .primary { font-size: 14px; font-weight: 600; }
      - type: custom:streamline-card
        template: section_title
        variables:
          font_size: '18px'
          compact: 'true'
          title: Temperature modes
      - type: grid
        columns: 2
        square: false
        cards:
          - type: tile
            entity: input_number.global_temperature_baseline_day
            name: Day baseline
            icon: m3of:light-mode
            features:
              - type: numeric-input
          - type: tile
            entity: input_number.global_temperature_baseline_night
            name: Night baseline
            icon: m3of:bedtime
            features:
              - type: numeric-input
          - type: tile
            entity: input_number.global_temperature_comfort
            name: Comfort
            icon: m3of:mode-heat
            features:
              - type: numeric-input
          - type: tile
            entity: input_number.global_temperature_minimum
            name: Minimum
            icon: m3of:ac-unit
            features:
              - type: numeric-input
      - type: custom:mushroom-title-card
        subtitle: Applies to all rooms that use the global setpoints.
        card_mod:
          style: |
            ha-card {
              padding: 6px 6px 0 6px !important;
              background: none;
              box-shadow: none;
              border: 0;
              --subtitle-font-size: 12px !important;
            }
            .subtitle { opacity: 0.62; }

# ── climate_ambient_summary ──────────────────────────────────────────
climate_ambient_summary:
  card:
    type: vertical-stack
    cards:
      - type: custom:button-card
        entity: sensor.house_average_temperature
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          temp: >
            [[[
              const t = parseFloat(entity?.state);
              return isNaN(t) ? '—' : `${t.toFixed(1)}°`;
            ]]]
          sub: >
            [[[
              const n = parseInt(states['sensor.house_heating_rooms']?.state) || 0;
              const firing = states['binary_sensor.house_heating_boiler_firing']?.state === 'on';
              const enabled = states['input_boolean.house_heating_enabled']?.state === 'on';
              if (!enabled) return 'Heating off';
              if (firing && n > 0) return `${n} room${n > 1 ? 's' : ''} heating`;
              if (firing) return 'Heating';
              return 'Idle';
            ]]]
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - border: none
            - padding: 4px 12px 0 12px
            - cursor: default
          grid:
            - grid-template-areas: '"temp" "sub"'
            - grid-template-rows: auto auto
            - justify-items: start
          custom_fields:
            temp:
              - font-size: 54px
              - font-weight: 700
              - color: var(--primary-text-color)
              - line-height: '1'
              - letter-spacing: -2px
            sub:
              - font-size: 13px
              - color: rgba(255,255,255,0.45)
              - margin-top: 6px
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.house_has_comfort_outliers
            state: 'on'
        card:
          type: custom:mushroom-chips-card
          alignment: start
          chips:
            - type: template
              entity: sensor.house_comfort_outliers
              icon: m3of:warning
              content: |
                Out of band: {{ states('sensor.house_comfort_outliers') }}
              tap_action:
                action: more-info
                entity: sensor.house_comfort_outliers
              card_mod:
                style: |
                  ha-card {
                    --chip-background: color-mix(in srgb, var(--md-sys-color-error) 12%, transparent);
                    --color: color-mix(in srgb, var(--md-sys-color-error) 92%, white);
                    animation: premiumPulseSoft 3.2s ease-in-out infinite;
                  }
          card_mod:
            style: |
              ha-card { --chip-spacing: 10px; margin-bottom: 0.9em; }
              mushroom-chip {
                border: none;
                border-radius: 999px;
                box-shadow: none;
                backdrop-filter: blur(14px);
                -webkit-backdrop-filter: blur(14px);
              }
              @keyframes premiumPulseSoft {
                0%, 100% { filter: brightness(1); }
                50%      { filter: brightness(1.05); }
              }

# ── climate_row_card ──────────────────────────────────────────
climate_row_card:
  default:
    - name: Room
    - icon: m3of:home
    - navigation_path: /mobile-dashboard/home
    - climate_entity: ''
    - temp_entity: ''
    - humidity_entity: ''
  variables:
    name: ''
    icon: ''
    navigation_path: ''
    climate_entity: ''
    temp_entity: ''
    humidity_entity: ''
  card:
    type: custom:button-card
    show_icon: true
    show_name: true
    icon: '[[icon]]'
    name: '[[name]]'
    tap_action:
      action: navigate
      navigation_path: '[[navigation_path]]'
    variables:
      climate_entity: '[[climate_entity]]'
      temp_entity: '[[temp_entity]]'
      humidity_entity: '[[humidity_entity]]'
    custom_fields:
      t: |
        [[[
          const te = variables.temp_entity;
          const ce = variables.climate_entity;

          let val = null;

          if (te && hass.states[te] && !['unknown','unavailable'].includes(hass.states[te].state)) {
            const n = Number(hass.states[te].state);
            val = Number.isFinite(n) ? n : null;
          }

          if (val === null && ce && hass.states[ce]) {
            const ct = hass.states[ce].attributes?.current_temperature;
            const n = Number(ct);
            val = Number.isFinite(n) ? n : null;
          }

          return (val === null) ? '—' : `${val.toFixed(1)}°`;
        ]]]
      sub: |
        [[[
          const te = variables.temp_entity;
          const ce = variables.climate_entity;
          const he = variables.humidity_entity;

          let current = null;
          if (te && hass.states[te] && !['unknown','unavailable'].includes(hass.states[te].state)) {
            const n = Number(hass.states[te].state);
            current = Number.isFinite(n) ? n : null;
          }
          if (current === null && ce && hass.states[ce]) {
            const n = Number(hass.states[ce].attributes?.current_temperature);
            current = Number.isFinite(n) ? n : null;
          }

          let target = null;
          if (ce && hass.states[ce]) {
            const n = Number(hass.states[ce].attributes?.temperature);
            target = Number.isFinite(n) ? n : null;
          }

          let arrow = '→';
          if (current !== null && target !== null) {
            if (current < target - 0.5) arrow = '↑';
            else if (current > target + 0.5) arrow = '↓';
          }

          let hum = null;
          if (he && hass.states[he]) {
            const s = hass.states[he].state;
            if (s !== 'unknown' && s !== 'unavailable') {
              const n = Number(s);
              hum = Number.isFinite(n) ? `${Math.round(n)}%` : null;
            }
          }

          const parts = [];
          if (target !== null) parts.push(`${arrow} ${target}°`);
          if (hum !== null) parts.push(hum);
          return parts.join(' · ') || '—';
        ]]]
      heatdot: |
        [[[
          const ce = variables.climate_entity;
          const a = ce && hass.states[ce] ? (hass.states[ce].attributes?.hvac_action || '') : '';
          const heating = (String(a).toLowerCase() === 'heating');
          return `<div class="heatdot" style="opacity:${heating ? 1 : 0};"></div>`;
        ]]]
    styles:
      card:
        - border-radius: 22px
        - padding: 14px 16px 14px 16px
        - border: none
        - background: |
            [[[
              const ce = variables.climate_entity;
              const a = ce && hass.states[ce] ? (hass.states[ce].attributes?.hvac_action || '') : '';
              const heating = (String(a).toLowerCase() === 'heating');

              return heating
                ? `radial-gradient(120% 140% at 92% 50%,
                    color-mix(in srgb, var(--md-sys-color-primary) 16%, transparent) 0%,
                    transparent 55%),
                   var(--md-sys-color-surface-container-low)`
                : `var(--md-sys-color-surface-container-low)`;
            ]]]
        - box-shadow: none
        - overflow: hidden
      grid:
        - grid-template-areas: '"i n heatdot t" "i n . sub"'
        - grid-template-columns: 42px 1fr 10px auto
        - grid-template-rows: auto auto
        - column-gap: 10px
        - row-gap: 3px
        - align-items: center
      icon:
        - width: 26px
        - height: 26px
        - color: color-mix(in srgb, var(--primary-text-color) 85%, transparent)
      name:
        - justify-self: start
        - font-size: 16px
        - font-weight: 650
        - letter-spacing: 0.2px
        - color: color-mix(in srgb, var(--primary-text-color) 92%, transparent)
      custom_fields:
        t:
          - justify-self: end
          - font-size: 18px
          - font-weight: 700
          - letter-spacing: 0.2px
          - color: |
              [[[
                const ce = variables.climate_entity;
                const a = ce && hass.states[ce] ? (hass.states[ce].attributes?.hvac_action || '') : '';
                const heating = (String(a).toLowerCase() === 'heating');

                return heating
                  ? 'color-mix(in srgb, var(--md-sys-color-primary) 92%, white)'
                  : 'color-mix(in srgb, var(--primary-text-color) 88%, transparent)';
              ]]]
        sub:
          - justify-self: end
          - font-size: 13px
          - font-weight: 600
          - color: color-mix(in srgb, var(--primary-text-color) 50%, transparent)
        heatdot:
          - align-self: center
          - justify-self: end
          - width: 10px
          - height: 10px
    card_mod:
      style: |
        ha-card .heatdot {
          width: 6px;
          height: 6px;
          border-radius: 999px;
          background: color-mix(in srgb, var(--md-sys-color-primary) 92%, white);
          box-shadow: 0 0 0 3px color-mix(in srgb, var(--md-sys-color-primary) 18%, transparent);
          transition: opacity 160ms ease;
        }

# ── sonos_follow_section ──────────────────────────────────────────
sonos_follow_section:
  variables:
    toggle_entity: ''
    grouped_entity: ''
    room_player: ''
  card:
    type: vertical-stack
    cards:
      - type: custom:streamline-card
        template: behaviour_section_header
        variables:
          title: Audio
      - type: grid
        columns: 1
        square: false
        cards:
          - type: custom:streamline-card
            template: behaviour_toggle_row
            variables:
              toggle_entity: '[[toggle_entity]]'
              name: Follow Parlour
              icon_on: m3of:speaker-group
              icon_off: m3of:speaker
      - type: custom:mushroom-chips-card
        alignment: start
        card_mod:
          style: |
            ha-card {
              --chip-background: rgba(255,255,255,0.05);
              --chip-border-radius: 6px;
              --color: rgba(255,255,255,0.38);
              margin-top: 0.2em;
            }
        chips:
          - type: conditional
            conditions:
              - condition: state
                entity: '[[grouped_entity]]'
                state: 'on'
            chip:
              type: template
              entity: '[[grouped_entity]]'
              icon: m3of:speaker-group
              content: Grouped with Parlour
              tap_action:
                action: more-info
                entity: '[[room_player]]'
