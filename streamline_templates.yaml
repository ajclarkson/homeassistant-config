# ── heating_mode_section ──────────────────────────────────────────
heating_mode_section:
  variables:
    room: ''
    climate_entity: ''
    temp_sensor: ''
    humidity_entity: ''
  card:
    type: vertical-stack
    cards:
      - type: custom:paper-buttons-row
        styles:
          justify-content: flex-start
          gap: 8px
          align-items: center
          margin: 28px 12px 0 12px
        buttons:
          - layout: name
            name: Heating
            styles:
              name:
                font-size: 20px
                font-weight: 600
                color: var(--primary-text-color)
              button:
                padding: 0
                background: none
          - layout: name
            name: >
              {% if is_state('input_boolean.house_heating_enabled', 'off') %}● House off
              {% elif is_state('input_boolean.[[room]]_automation_heating_enabled', 'off') %}● Room off
              {% elif state_attr('[[climate_entity]]', 'hvac_action') == 'heating' %}● Active
              {% else %}● Idle{% endif %}
            styles:
              name:
                font-size: 11px
                font-weight: 600
                letter-spacing: 0.3px
                color: >
                  {% if is_state('input_boolean.house_heating_enabled', 'off') %}rgba(255,255,255,0.28)
                  {% elif is_state('input_boolean.[[room]]_automation_heating_enabled', 'off') %}rgba(251, 191, 36, 0.85)
                  {% elif state_attr('[[climate_entity]]', 'hvac_action') == 'heating' %}rgba(134, 239, 172, 0.85)
                  {% else %}rgba(255,255,255,0.28){% endif %}
              button:
                padding: 3px 8px
                background: >
                  {% if is_state('input_boolean.house_heating_enabled', 'off') %}rgba(255,255,255,0.05)
                  {% elif is_state('input_boolean.[[room]]_automation_heating_enabled', 'off') %}rgba(251, 191, 36, 0.10)
                  {% elif state_attr('[[climate_entity]]', 'hvac_action') == 'heating' %}rgba(134, 239, 172, 0.1)
                  {% else %}rgba(255,255,255,0.05){% endif %}
                border-radius: 999px
      - type: custom:button-card
        show_name: false
        show_state: false
        show_icon: false
        custom_fields:
          temp: >
            [[[
              const sensor = '[[temp_sensor]]';
              const t = sensor
                ? parseFloat(states[sensor]?.state)
                : parseFloat(entity?.attributes?.current_temperature);
              return !isNaN(t) ? `${t.toFixed(1)}°` : '—';
            ]]]
          sub: >
            [[[
              const hum = parseFloat(states['[[humidity_entity]]']?.state);
              const houseOff = states['input_boolean.house_heating_enabled']?.state === 'off';
              const roomOff = states['input_boolean.[[room]]_automation_heating_enabled']?.state === 'off';
              const target = entity?.attributes?.temperature;

              const sensor = '[[temp_sensor]]';
              const current = sensor
                ? parseFloat(states[sensor]?.state)
                : parseFloat(entity?.attributes?.current_temperature);

              const effectiveTarget = houseOff ? 5.0 : target;
              let arrow = '→';
              if (!isNaN(current) && effectiveTarget != null) {
                if (current < effectiveTarget - 0.5) arrow = '↑';
                else if (current > effectiveTarget + 0.5) arrow = '↓';
              }

              const parts = [];
              if (houseOff) {
                parts.push(`${arrow} 5°C frost protect`);
              } else if (!roomOff && target != null) {
                parts.push(`${arrow} ${target}°C target`);
              }
              if (!isNaN(hum)) parts.push(`${Math.round(hum)}% humidity`);
              return parts.join(' · ') || '';
            ]]]
        entity: '[[climate_entity]]'
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - border: none
            - padding: 4px 12px 0 12px
            - cursor: default
          grid:
            - grid-template-areas: '"temp" "sub"'
            - grid-template-rows: auto auto
            - justify-items: start
          custom_fields:
            temp:
              - font-size: 54px
              - font-weight: 700
              - color: var(--primary-text-color)
              - line-height: '1'
              - letter-spacing: -2px
            sub:
              - font-size: 13px
              - color: rgba(255,255,255,0.45)
              - margin-top: 6px
      - type: custom:apexcharts-card
        graph_span: 24h
        header:
          show: false
        card_mod:
          style: |
            ha-card {
              background: transparent !important;
              box-shadow: none !important;
              border: none !important;
              padding: 0;
              margin: 4px 12px 0 12px;
            }
        apex_config:
          chart:
            height: 80
            sparkline:
              enabled: true
          stroke:
            curve: smooth
            width: 2
        series:
          - entity: '[[temp_sensor]]'
            color: 'rgba(184,154,85,0.9)'
            type: area
            opacity: 0.15
            stroke_width: 2
            show:
              legend_value: false
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.[[room]]_active_heating
            primary: Comfort
            secondary: >
              {{ states('input_number.global_temperature_comfort') | int }}°C
            icon: m3of:mode-heat
            icon_color: >
              {% if states('sensor.[[room]]_active_heating') == 'comfort' %}rgba(249,115,22,0.90){% else %}rgba(255,255,255,0.45){% endif %}
            layout: horizontal
            tap_action:
              action: call-service
              service: input_select.select_option
              target:
                entity_id: input_select.[[room]]_active_heating_mode
              data:
                option: comfort
            hold_action:
              action: more-info
            card_mod:
              style:
                .: |
                  ha-card {
                    {% set active = states('sensor.[[room]]_active_heating') == 'comfort' %}
                    border-radius: 8px;
                    border: none;
                    background: {% if active %}color-mix(in srgb, #f97316 12%, var(--ha-card-background, var(--card-background-color))){% else %}color-mix(in srgb, var(--ha-card-background, var(--card-background-color)) 78%, transparent){% endif %};
                    box-shadow: none;
                    padding: 0;
                    --icon-size: 18px;
                    --shape-color: transparent;
                    --shape-border-radius: 0px;
                    --spacing: 10px;
                  }
                  ha-card:active { transform: scale(0.99); }
                ha-tile-icon$: |
                  .container::before { background: transparent !important; }
                mushroom-state-item$: |
                  .container { padding: 10px 14px; gap: 12px; }
                mushroom-primary-info$: |
                  .primary { font-size: 14px; font-weight: 600; }
                mushroom-secondary-info$: |
                  .secondary { font-size: 12px; opacity: 0.55; }
          - type: custom:mushroom-template-card
            entity: sensor.[[room]]_active_heating
            primary: Day
            secondary: >
              {{ states('input_number.global_temperature_baseline_day') | int }}°C
            icon: m3of:light-mode
            icon_color: >
              {% if states('sensor.[[room]]_active_heating') == 'baseline_day' %}rgba(251,146,60,0.90){% else %}rgba(255,255,255,0.45){% endif %}
            layout: horizontal
            tap_action:
              action: call-service
              service: input_select.select_option
              target:
                entity_id: input_select.[[room]]_active_heating_mode
              data:
                option: baseline_day
            hold_action:
              action: more-info
            card_mod:
              style:
                .: |
                  ha-card {
                    {% set active = states('sensor.[[room]]_active_heating') == 'baseline_day' %}
                    border-radius: 8px;
                    border: none;
                    background: {% if active %}color-mix(in srgb, #fb923c 12%, var(--ha-card-background, var(--card-background-color))){% else %}color-mix(in srgb, var(--ha-card-background, var(--card-background-color)) 78%, transparent){% endif %};
                    box-shadow: none;
                    padding: 0;
                    --icon-size: 18px;
                    --shape-color: transparent;
                    --shape-border-radius: 0px;
                    --spacing: 10px;
                  }
                  ha-card:active { transform: scale(0.99); }
                ha-tile-icon$: |
                  .container::before { background: transparent !important; }
                mushroom-state-item$: |
                  .container { padding: 10px 14px; gap: 12px; }
                mushroom-primary-info$: |
                  .primary { font-size: 14px; font-weight: 600; }
                mushroom-secondary-info$: |
                  .secondary { font-size: 12px; opacity: 0.55; }
          - type: custom:mushroom-template-card
            entity: sensor.[[room]]_active_heating
            primary: Night
            secondary: >
              {{ states('input_number.global_temperature_baseline_night') | int }}°C
            icon: m3of:bedtime
            icon_color: >
              {% if states('sensor.[[room]]_active_heating') == 'baseline_night' %}rgba(125,211,252,0.90){% else %}rgba(255,255,255,0.45){% endif %}
            layout: horizontal
            tap_action:
              action: call-service
              service: input_select.select_option
              target:
                entity_id: input_select.[[room]]_active_heating_mode
              data:
                option: baseline_night
            hold_action:
              action: more-info
            card_mod:
              style:
                .: |
                  ha-card {
                    {% set active = states('sensor.[[room]]_active_heating') == 'baseline_night' %}
                    border-radius: 8px;
                    border: none;
                    background: {% if active %}color-mix(in srgb, #7dd3fc 12%, var(--ha-card-background, var(--card-background-color))){% else %}color-mix(in srgb, var(--ha-card-background, var(--card-background-color)) 78%, transparent){% endif %};
                    box-shadow: none;
                    padding: 0;
                    --icon-size: 18px;
                    --shape-color: transparent;
                    --shape-border-radius: 0px;
                    --spacing: 10px;
                  }
                  ha-card:active { transform: scale(0.99); }
                ha-tile-icon$: |
                  .container::before { background: transparent !important; }
                mushroom-state-item$: |
                  .container { padding: 10px 14px; gap: 12px; }
                mushroom-primary-info$: |
                  .primary { font-size: 14px; font-weight: 600; }
                mushroom-secondary-info$: |
                  .secondary { font-size: 12px; opacity: 0.55; }
          - type: custom:mushroom-template-card
            entity: sensor.[[room]]_active_heating
            primary: Frost
            secondary: >
              {{ states('input_number.global_temperature_minimum') | int }}°C
            icon: m3of:ac-unit
            icon_color: >
              {% if states('sensor.[[room]]_active_heating') == 'minimum' %}rgba(96,165,250,0.90){% else %}rgba(255,255,255,0.45){% endif %}
            layout: horizontal
            tap_action:
              action: call-service
              service: input_select.select_option
              target:
                entity_id: input_select.[[room]]_active_heating_mode
              data:
                option: minimum
            hold_action:
              action: more-info
            card_mod:
              style:
                .: |
                  ha-card {
                    {% set active = states('sensor.[[room]]_active_heating') == 'minimum' %}
                    border-radius: 8px;
                    border: none;
                    background: {% if active %}color-mix(in srgb, #60a5fa 12%, var(--ha-card-background, var(--card-background-color))){% else %}color-mix(in srgb, var(--ha-card-background, var(--card-background-color)) 78%, transparent){% endif %};
                    box-shadow: none;
                    padding: 0;
                    --icon-size: 18px;
                    --shape-color: transparent;
                    --shape-border-radius: 0px;
                    --spacing: 10px;
                  }
                  ha-card:active { transform: scale(0.99); }
                ha-tile-icon$: |
                  .container::before { background: transparent !important; }
                mushroom-state-item$: |
                  .container { padding: 10px 14px; gap: 12px; }
                mushroom-primary-info$: |
                  .primary { font-size: 14px; font-weight: 600; }
                mushroom-secondary-info$: |
                  .secondary { font-size: 12px; opacity: 0.55; }
# ── presence_section ──────────────────────────────────────────
presence_section:
  default:
    - held_row_opacity: 0.86
    - held_row_brightness: 0.96
    - reason_1_entity: ''
    - reason_1_state: ''
    - reason_1_icon: ''
    - reason_1_label: ''
    - reason_2_entity: ''
    - reason_2_state: ''
    - reason_2_icon: ''
    - reason_2_label: ''
    - reason_3_entity: ''
    - reason_3_state: ''
    - reason_3_icon: ''
    - reason_3_label: ''
    - reason_4_entity: ''
    - reason_4_state: ''
    - reason_4_icon: ''
    - reason_4_label: ''
    - reason_5_entity: ''
    - reason_5_state: ''
    - reason_5_icon: ''
    - reason_5_label: ''
    - reason_6_entity: ''
    - reason_6_state: ''
    - reason_6_icon: ''
    - reason_6_label: ''
  variables:
    occupied_entity: ''
    pir_entity: ''
    motion_enabled_entity: ''
    override_entity: ''
    contained_entity: ''
    held_row_opacity: ''
    held_row_brightness: ''
    reason_1_entity: ''
    reason_1_state: ''
    reason_1_icon: ''
    reason_1_label: ''
    reason_2_entity: ''
    reason_2_state: ''
    reason_2_icon: ''
    reason_2_label: ''
    reason_3_entity: ''
    reason_3_state: ''
    reason_3_icon: ''
    reason_3_label: ''
    reason_4_entity: ''
    reason_4_state: ''
    reason_4_icon: ''
    reason_4_label: ''
    reason_5_entity: ''
    reason_5_state: ''
    reason_5_icon: ''
    reason_5_label: ''
    reason_6_entity: ''
    reason_6_state: ''
    reason_6_icon: ''
    reason_6_label: ''
  card:
    type: vertical-stack
    cards:
      - type: custom:streamline-card
        template: behaviour_section_header
        variables:
          title: Presence
          margin_top: 0px
      - type: grid
        columns: 1
        square: false
        cards:
          - type: custom:streamline-card
            template: behaviour_toggle_row
            variables:
              toggle_entity: '[[motion_enabled_entity]]'
              name: Motion sensor
              icon_on: m3of:sensors
              icon_off: m3of:sensors-off
          - type: custom:streamline-card
            template: behaviour_toggle_row
            variables:
              toggle_entity: '[[override_entity]]'
              name: Presence override
              icon_on: m3of:person
              icon_off: m3of:person-off
      - type: custom:streamline-card
        template: behaviour_status_label
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            entity: '[[occupied_entity]]'
            icon: m3of:person
            content: >
              {% if is_state('[[occupied_entity]]','on') %}Occupied{% else %}Clear{% endif %}
            tap_action:
              action: more-info
              entity: '[[occupied_entity]]'
          - type: template
            entity: '[[pir_entity]]'
            icon: m3of:directions-walk
            content: >
              {% if is_state('[[pir_entity]]','on') %}Motion{% else %}No motion{% endif %}
            tap_action:
              action: more-info
              entity: '[[pir_entity]]'
          - type: conditional
            conditions:
              - condition: template
                value_template: |
                  {{ '[[contained_entity]]' != '' }}
            chip:
              type: conditional
              conditions:
                - condition: state
                  entity: '[[contained_entity]]'
                  state: 'on'
              chip:
                type: template
                entity: '[[contained_entity]]'
                icon: m3of:meeting-room
                content: Contained
                tap_action:
                  action: more-info
                  entity: '[[contained_entity]]'
        card_mod:
          style: |
            ha-card {
              --chip-background: rgba(255,255,255,0.05);
              --chip-border-radius: 6px;
              --color: rgba(255,255,255,0.38);
              margin-top: 0.2em;
            }
      - type: conditional
        conditions:
          - condition: or
            conditions:
              - condition: state
                entity: '[[reason_1_entity]]'
                state: '[[reason_1_state]]'
              - condition: state
                entity: '[[reason_2_entity]]'
                state: '[[reason_2_state]]'
              - condition: state
                entity: '[[reason_3_entity]]'
                state: '[[reason_3_state]]'
              - condition: state
                entity: '[[reason_4_entity]]'
                state: '[[reason_4_state]]'
              - condition: state
                entity: '[[reason_5_entity]]'
                state: '[[reason_5_state]]'
              - condition: state
                entity: '[[reason_6_entity]]'
                state: '[[reason_6_state]]'
        card:
          type: custom:mushroom-chips-card
          alignment: start
          card_mod:
            style: |
              ha-card {
                --chip-background: rgba(255,255,255,0.05);
                --chip-border-radius: 6px;
                --color: rgba(255,255,255,0.38);
              }
          chips:
            - type: template
              icon: m3of:pause-circle
              content: Presence held
              tap_action:
                action: none
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[reason_1_entity]]'
                  state: '[[reason_1_state]]'
              chip:
                type: template
                entity: '[[reason_1_entity]]'
                icon: '[[reason_1_icon]]'
                content: '[[reason_1_label]]'
                tap_action:
                  action: more-info
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[reason_2_entity]]'
                  state: '[[reason_2_state]]'
              chip:
                type: template
                entity: '[[reason_2_entity]]'
                icon: '[[reason_2_icon]]'
                content: '[[reason_2_label]]'
                tap_action:
                  action: more-info
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[reason_3_entity]]'
                  state: '[[reason_3_state]]'
              chip:
                type: template
                entity: '[[reason_3_entity]]'
                icon: '[[reason_3_icon]]'
                content: '[[reason_3_label]]'
                tap_action:
                  action: more-info
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[reason_4_entity]]'
                  state: '[[reason_4_state]]'
              chip:
                type: template
                entity: '[[reason_4_entity]]'
                icon: '[[reason_4_icon]]'
                content: '[[reason_4_label]]'
                tap_action:
                  action: more-info
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[reason_5_entity]]'
                  state: '[[reason_5_state]]'
              chip:
                type: template
                entity: '[[reason_5_entity]]'
                icon: '[[reason_5_icon]]'
                content: '[[reason_5_label]]'
                tap_action:
                  action: more-info
            - type: conditional
              conditions:
                - condition: state
                  entity: '[[reason_6_entity]]'
                  state: '[[reason_6_state]]'
              chip:
                type: template
                entity: '[[reason_6_entity]]'
                icon: '[[reason_6_icon]]'
                content: '[[reason_6_label]]'
                tap_action:
                  action: more-info

# ── room_header_stack ──────────────────────────────────────────
room_header_stack:
  variables:
    navigation_path: /mobile-dashboard
    title: ''
    room_motion_sensor: ''
    room_climate_entity: ''
    room_temp_sensor: ''
    popup_hash: ''
  card:
    type: vertical-stack
    cards:
      - type: custom:streamline-card
        template: room_title_card
        variables:
          title: '[[title]]'
          room_motion_sensor: '[[room_motion_sensor]]'
          popup_hash: '[[popup_hash]]'
      - type: custom:streamline-card
        template: room_description_card
        variables:
          room_climate_entity: '[[room_climate_entity]]'
          room_temp_sensor: '[[room_temp_sensor]]'

# ── room_tabs_scaffold ──────────────────────────────────────────
room_tabs_scaffold:
  default:
    - active_background: transparent
    - active_text_color: var(--primary-text-color)
    - text_color: rgba(255,255,255,0.45)
  variables:
    room_tab_cards: []
    climate_tab_cards: []
  card:
    type: custom:mod-card
    card_mod:
      style:
        simple-tabs$: |
          .tabs-container {
            display: block !important;
          }
          .tabs {
            display: flex !important;
            width: 100% !important;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
          }
          .tab-button {
            flex: 1 !important;
            text-align: center;
            border: none !important;
            outline: none !important;
            border-radius: 0 !important;
            border-bottom: 2px solid transparent !important;
            margin-bottom: -2px;
            padding: 10px 8px;
          }
          .tab-button.active {
            border-bottom: 2px solid var(--primary-text-color) !important;
          }
    card:
      type: custom:simple-tabs
      pre-load: true
      active-background: '[[active_background]]'
      active-text-color: '[[active_text_color]]'
      text-color: '[[text_color]]'
      tabs:
        - title: Room
          icon: m3of:home
          card:
            type: vertical-stack
            cards: '[[room_tab_cards]]'
        - title: Climate
          icon: m3of:heat-pump
          card:
            type: vertical-stack
            cards: '[[climate_tab_cards]]'
# ── lights_popup_section ──────────────────────────────────────────
lights_popup_section:
  default:
    - title: Individual Lights
    - icon: m3of:lightbulb
    - off_label: 'Off'
  variables:
    popup_hash: ''
    off_scene: ''
    title: ''
    icon: ''
    off_label: ''
    popup_cards: []
  card:
    type: custom:bubble-card
    card_type: pop-up
    name: '[[title]]'
    icon: '[[icon]]'
    hash: '[[popup_hash]]'
    show_header: false
    cards:
      - type: custom:paper-buttons-row
        styles:
          justify-content: flex-start
          margin: 20px 12px 8px 12px
        buttons:
          - layout: name
            name: '[[title]]'
            styles:
              name:
                font-size: 22px
                font-weight: 700
                letter-spacing: -0.3px
                color: var(--primary-text-color)
              button:
                padding: 0
                background: none
      - type: custom:mushroom-template-card
        primary: '[[off_label]]'
        icon: mdi:power
        layout: horizontal
        tap_action:
          action: call-service
          service: scene.turn_on
          target:
            entity_id: '[[off_scene]]'
        card_mod:
          style: |
            ha-card {
              border-radius: 8px;
              border: none;
              background: var(--md-sys-color-surface-container-high);
              box-shadow: none;
              --icon-size: 18px;
              --shape-color: transparent;
              --shape-border-radius: 0px;
              --spacing: 10px;
            }
      - type: vertical-stack
        cards: '[[popup_cards]]'
# ── heating_automation_section ──────────────────────────────────────────
heating_automation_section:
  default:
    - heating_hold_label: Heating held
  variables:
    toggle_entity: ''
    heating_hold_entity: ''
    heating_hold_label: ''
  card:
    type: vertical-stack
    cards:
      - type: custom:streamline-card
        template: behaviour_section_header
        variables:
          title: Heating
      - type: grid
        columns: 1
        square: false
        cards:
          - type: custom:streamline-card
            template: behaviour_toggle_row
            variables:
              toggle_entity: '[[toggle_entity]]'
              name: Automatic heating
              icon_on: m3of:mode-heat
              icon_off: m3of:mode-heat
      - type: custom:mushroom-chips-card
        alignment: start
        card_mod:
          style: |
            ha-card {
              --chip-background: rgba(255,255,255,0.05);
              --chip-border-radius: 6px;
              --color: rgba(255,255,255,0.38);
            }
        chips:
          - type: conditional
            conditions:
              - condition: state
                entity: '[[heating_hold_entity]]'
                state: 'on'
            chip:
              type: template
              icon: m3of:pause-circle
              content: '[[heating_hold_label]]'
              tap_action:
                action: none
      - type: custom:auto-entities
        card:
          type: custom:mushroom-chips-card
          alignment: start
        card_mod:
          style: |
            ha-card {
              --chip-background: rgba(255,255,255,0.05);
              --chip-border-radius: 6px;
              --color: rgba(255,255,255,0.38);
            }
        card_param: chips
        filter:
          include:
            - group: '[[heating_hold_entity]]'
              state: 'on'
              options:
                type: template
                entity: this.entity_id
                icon: >
                  {% set dc = state_attr(config.entity,'device_class') %}
                  {{ 'm3of:door-open' if dc == 'door' else 'm3of:window-open' }}
                content: |
                  {{ states[config.entity].name }}
                tap_action:
                  action: more-info
                  entity: this.entity_id
          exclude: []
        show_empty: false

# ── section_title ──────────────────────────────────────────
section_title:
  default:
    - font_size: '20px'
    - compact: 'false'
  variables:
    title: ''
    font_size: ''
    compact: ''
  card:
    type: custom:mushroom-title-card
    title: '[[title]]'
    card_mod:
      style: |
        ha-card {
          --title-font-size: [[font_size]] !important;
          background: none;
          box-shadow: none;
          border: 0;
          {% if '[[compact]]' == 'true' %}padding: 8px 0 2px 0 !important;{% endif %}
        }
# ── room_title_card ──────────────────────────────────────────
room_title_card:
  variables:
    - title: ''
    - room_motion_sensor: ''
    - popup_hash: ''
  card:
    type: custom:paper-buttons-row
    styles:
      justify-content: flex-start
      gap: 10px
      align-items: center
      margin: 0 12px 0 12px
    buttons:
      - layout: name
        name: '[[title]]'
        styles:
          name:
            font-size: 30px
            font-weight: 700
            color: var(--primary-text-color)
          button:
            padding: 0
            background: none
      - layout: name
        name: >
          {% if is_state('[[room_motion_sensor]]', 'on') %}● Occupied{% else %}● Vacant{% endif %}
        styles:
          name:
            font-size: 11px
            font-weight: 600
            letter-spacing: 0.3px
            color: >
              {% if is_state('[[room_motion_sensor]]', 'on') %}rgba(134, 239, 172, 0.85){% else %}rgba(255,255,255,0.28){% endif %}
          button:
            padding: 3px 8px
            background: >
              {% if is_state('[[room_motion_sensor]]', 'on') %}rgba(134, 239, 172, 0.1){% else %}rgba(255,255,255,0.05){% endif %}
            border-radius: 999px
      - layout: name
        name: ''
        styles:
          button:
            flex: '1'
            background: none
            pointer-events: none
      - layout: icon
        icon: m3of:tune
        tap_action:
          action: navigate
          navigation_path: '[[popup_hash]]'
        styles:
          icon:
            color: color-mix(in srgb, var(--primary-text-color) 45%, transparent)
            width: 22px
            height: 22px
          button:
            background: none
            padding: 0
            margin-right: 4px

# ── room_description_card ──────────────────────────────────────────
room_description_card:
  default:
    - room_climate_entity: ''
    - room_temp_sensor: ''
  variables:
    - name: room_climate_entity
      selector:
        entity:
          domain: climate
    - name: room_temp_sensor
      selector:
        entity:
          domain: sensor
  card:
    type: custom:mushroom-chips-card
    alignment: start
    chips:
      - type: template
        icon: >
          {% set a = state_attr('[[room_climate_entity]]', 'hvac_action') %}
          {{ 'm3of:mode-heat' if a == 'heating' else 'm3of:thermometer' }}
        content: >
          {% set ts = states('[[room_temp_sensor]]') %}
          {% set t = ts | float(none) if ts not in ['unknown','unavailable',''] else state_attr('[[room_climate_entity]]','current_temperature') %}
          {% if t is not none %}{{ t | float | round(1) }}°{% else %}—{% endif %}
        tap_action:
          action: more-info
          entity: '[[room_climate_entity]]'
        card_mod:
          style: |
            ha-card {
              {% set a = state_attr('[[room_climate_entity]]', 'hvac_action') %}
              {% if a == 'heating' %}
              --color: var(--md-sys-color-error);
              {% else %}
              --color: color-mix(in srgb, var(--primary-text-color) 70%, transparent);
              {% endif %}
              --chip-background: transparent;
              --chip-border-radius: 4px;
              box-shadow: none;
            }
            ha-card mushroom-chip span {
              font-size: 26px;
              font-weight: 300;
              letter-spacing: -0.5px;
            }
    card_mod:
      style: |
        ha-card { --chip-font-size: 26px; margin: 0 0 0 6px; }

# ── media_player_card ──────────────────────────────────────────
media_player_card:
  variables:
    entity: ''
    name: ''
    icon: mdi:speaker-wireless
  card:
    type: custom:mushroom-template-card
    entity: '[[entity]]'
    primary: '[[name]]'
    secondary: >
      {% set title = state_attr('[[entity]]', 'media_title') %}
      {% set artist = state_attr('[[entity]]', 'media_artist') %}
      {% if artist and title %}{{ title }} · {{ artist }}
      {% elif title %}{{ title }}
      {% else %}{% endif %}
    icon: '[[icon]]'
    layout: horizontal
    tap_action:
      action: more-info
    card_mod:
      style:
        .: |
          ha-card {
            border-radius: 8px;
            border: none;
          }
          ha-state-icon {
            color: {{ 'var(--md-sys-color-primary)' if is_state('[[entity]]', ['playing','paused','on']) else 'rgba(255,255,255,0.45)' }};
          }
        ha-tile-icon$: |
          .container::before {
            background: transparent !important;
          }
        mushroom-state-item$: |
          .container {
            padding: 10px 14px;
            gap: 12px;
          }
        mushroom-secondary-info$: |
          .secondary {
            font-size: 12px;
            opacity: 0.65;
          }

# ── spacer_card ──────────────────────────────────────────
spacer_card:
  variables:
    padding: ''
  card:
    type: custom:button-card
    show_name: false
    show_icon: false
    tap_action:
      action: none
    styles:
      card:
        - background: none
        - box-shadow: none
        - padding: '[[padding]]'

# ── scene_card ──────────────────────────────────────────
scene_card:
  default:
    - default_icon: 'mdi:palette'
    - inactive_bg_opacity: '78%'
    - label_color_override: ''
    - icon_color_override: ''
  variables:
    entity: ''
    name: ''
    room: ''
    default_icon: ''
    inactive_bg_opacity: ''
    label_color_override: ''
    icon_color_override: ''
  card:
    type: custom:mushroom-template-card
    entity: '[[entity]]'
    primary: '[[name]]'
    icon: >
      {% set icon = state_attr('[[entity]]', 'icon') %}
      {{ icon if icon else '[[default_icon]]' }}
    icon_color: >
      {% set active = states('sensor.[[room]]_active_scene') == '[[entity]]'[6:] %}
      {% if active %}var(--md-sys-color-primary){% else %}rgba(255,255,255,0.45){% endif %}
    layout: horizontal
    tap_action:
      action: call-service
      service: scene.turn_on
      target:
        entity_id: '[[entity]]'
    hold_action:
      action: more-info
      entity: '[[entity]]'
    card_mod:
      style:
        .: |
          ha-card {
            {% set active = states('sensor.[[room]]_active_scene') == '[[entity]]'[6:] %}
            border-radius: 8px;
            border: none;
            background: {% if active %}color-mix(in srgb, var(--md-sys-color-primary) 10%, var(--ha-card-background, var(--card-background-color))){% else %}color-mix(in srgb, var(--ha-card-background, var(--card-background-color)) [[inactive_bg_opacity]], transparent){% endif %};
            box-shadow: none;
            padding: 0;
            --icon-size: 18px;
            --shape-color: transparent;
            --shape-border-radius: 0px;
            --spacing: 10px;
          }
          ha-card:active {
            transform: scale(0.99);
          }
        ha-tile-icon$: |
          .container::before {
            background: transparent !important;
          }
        mushroom-state-item$: |
          .container {
            padding: 10px 14px;
            gap: 12px;
          }
        mushroom-primary-info$: |
          .primary {
            font-size: 14px;
            font-weight: 600;
            [[label_color_override]]
          }
        ha-state-icon$: |
          ha-svg-icon {
            [[icon_color_override]]
          }

# ── spacer_card ──────────────────────────────────────────
spacer_card:
  variables:
    padding: ''
  card:
    type: custom:button-card
    show_name: false
    show_icon: false
    tap_action:
      action: none
    styles:
      card:
        - background: none
        - box-shadow: none
        - padding: '[[padding]]'
