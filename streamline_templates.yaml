# ── rooms_popup_tile ──────────────────────────────────────────
rooms_popup_tile:
  variables:
    name: ''
    icon: ''
    navigation_path: ''
    occupancy_entity: ''
  card:
    type: custom:button-card
    name: '[[name]]'
    icon: '[[icon]]'
    entity: '[[occupancy_entity]]'
    tap_action:
      action: navigate
      navigation_path: '[[navigation_path]]'
    show_state: false
    custom_fields:
      glow: <div></div>
    styles:
      card:
        - position: relative
        - background: var(--md-sys-color-surface-container-high)
        - border-radius: 28px
        - border: none
        - box-shadow: none
        - overflow: hidden
        - padding: 14px 14px 12px
        - height: 110px
        - backdrop-filter: blur(10px)
        - '-webkit-backdrop-filter': blur(10px)
        - transition: >-
            transform 120ms ease, background 160ms ease, border-color 160ms
            ease, box-shadow 160ms ease
      grid:
        - grid-template-areas: '"glow" "i" "n"'
        - grid-template-columns: 1fr
        - grid-template-rows: 0px auto auto
        - row-gap: 10px
        - justify-items: center
        - align-items: center
      custom_fields:
        glow:
          - position: absolute
          - top: 14px
          - left: 50%
          - transform: translateX(-50%)
          - width: 70px
          - height: 70px
          - border-radius: 999px
          - background: >-
              radial-gradient(circle at 30% 30%, color-mix(in srgb,
              var(--md-sys-color-primary) 26%, transparent), transparent 68%)
          - filter: blur(10px)
          - opacity: >-
              [[[
                return states['[[occupancy_entity]]']?.state === 'on' ? 0.55 : 0.18;
              ]]]
          - pointer-events: none
          - z-index: 0
      icon:
        - width: 30px
        - height: 30px
        - color: >-
            [[[
              return states['[[occupancy_entity]]']?.state === 'on'
                ? 'var(--md-sys-color-primary)'
                : 'color-mix(in srgb, var(--primary-text-color) 40%, transparent)';
            ]]]
        - z-index: 1
      name:
        - font-size: 15px
        - line-height: 1.1
        - font-weight: 650
        - letter-spacing: 0.2px
        - color: color-mix(in srgb, var(--primary-text-color) 92%, transparent)
        - z-index: 1
    extra_styles: |
      ha-card:hover {
        background: color-mix(in srgb, var(--ha-card-background, var(--card-background-color)) 92%, transparent);
        border-color: color-mix(in srgb, var(--primary-text-color) 14%, transparent);
        box-shadow: 0 14px 34px rgba(0,0,0,0.34);
      }
      ha-card:active {
        transform: scale(0.985);
        background: color-mix(in srgb, var(--ha-card-background, var(--card-background-color)) 94%, transparent);
        box-shadow: 0 8px 20px rgba(0,0,0,0.30);
      }

