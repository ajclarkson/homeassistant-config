title: Home
path: home
icon: mdi:home
type: sections
max_columns: 1
sections:
  - type: grid
    cards:
      - type: custom:paper-buttons-row
        styles:
          justify-content: flex-start
          gap: 10px
          align-items: center
          margin: 0 12px 0 12px
        buttons:
          - layout: name
            name: Home
            styles:
              name:
                font-size: 30px
                font-weight: 700
                color: var(--primary-text-color)
              button:
                padding: 0
                background: none
          - layout: name
            name: >
              {% set modifier = states('input_select.house_active_mode_modifier') %}
              {% set mode = states('sensor.house_active_mode') %}
              {% if modifier != 'none' %}● {{ modifier | title }}{% else %}● {{ mode | replace('_', ' ') | title }}{% endif %}
            styles:
              name:
                font-size: 11px
                font-weight: 600
                letter-spacing: 0.3px
                color: >
                  {% set modifier = states('input_select.house_active_mode_modifier') %}
                  {% set mode = states('sensor.house_active_mode') %}
                  {% if modifier != 'none' %}color-mix(in srgb, var(--md-sys-color-primary) 85%, white)
                  {% elif mode == 'away' %}color-mix(in srgb, var(--md-sys-color-primary) 85%, white)
                  {% elif mode == 'sleep' %}rgba(147, 197, 253, 0.85)
                  {% else %}rgba(134, 239, 172, 0.85){% endif %}
              button:
                padding: 3px 8px
                background: >
                  {% set modifier = states('input_select.house_active_mode_modifier') %}
                  {% set mode = states('sensor.house_active_mode') %}
                  {% if modifier != 'none' %}color-mix(in srgb, var(--md-sys-color-primary) 14%, transparent)
                  {% elif mode == 'away' %}color-mix(in srgb, var(--md-sys-color-primary) 14%, transparent)
                  {% elif mode == 'sleep' %}rgba(147, 197, 253, 0.1)
                  {% else %}rgba(134, 239, 172, 0.1){% endif %}
                border-radius: 999px
          - layout: name
            name: ''
            styles:
              button:
                flex: '1'
                background: none
                pointer-events: none
          - layout: icon
            icon: m3of:tune
            tap_action:
              action: navigate
              navigation_path: '#house_settings'
            styles:
              icon:
                color: color-mix(in srgb, var(--primary-text-color) 45%, transparent)
                width: 22px
                height: 22px
              button:
                background: none
                padding: 0
                margin-right: 4px
      - type: custom:mushroom-chips-card
        alignment: start
        chips:
          - type: template
            entity: person.adam
            icon: mdi:account
            content: >
              {% set home = is_state('person.adam', 'home') %}{% set wfh = is_state('input_boolean.wfh_adam', 'on') %}Adam · {% if home and wfh %}WFH{% elif home %}Home{% elif wfh %}Away · WFH{% else %}Away{% endif %}
            icon_color: >
              {% if is_state('person.adam', 'home') %}green{% else %}disabled{% endif %}
            tap_action:
              action: more-info
              entity: person.adam
            card_mod:
              style: |
                ha-card {
                  --chip-background: {% if is_state('person.adam', 'home') %}color-mix(in srgb, #86efac 12%, transparent){% else %}rgba(255,255,255,0.06){% endif %};
                  border: none;
                  box-shadow: none;
                }
          - type: template
            entity: person.sarah
            icon: mdi:account
            content: >
              {% set home = is_state('person.sarah', 'home') %}{% set wfh = is_state('input_boolean.wfh_sarah', 'on') %}Sarah · {% if home and wfh %}WFH{% elif home %}Home{% elif wfh %}Away · WFH{% else %}Away{% endif %}
            icon_color: >
              {% if is_state('person.sarah', 'home') %}green{% else %}disabled{% endif %}
            tap_action:
              action: more-info
              entity: person.sarah
            card_mod:
              style: |
                ha-card {
                  --chip-background: {% if is_state('person.sarah', 'home') %}color-mix(in srgb, #86efac 12%, transparent){% else %}rgba(255,255,255,0.06){% endif %};
                  border: none;
                  box-shadow: none;
                }
          - type: template
            entity: sensor.mo_timeline
            icon: mdi:cat
            content: Mo
            tap_action:
              action: navigate
              navigation_path: /mobile-dashboard/mo
            card_mod:
              style: |
                ha-card {
                  --chip-background: rgba(255,255,255,0.06);
                  border: none;
                  box-shadow: none;
                }
          - type: conditional
            conditions:
              - condition: numeric_state
                entity: sensor.bin_collection_min_days
                below: 2
            chip:
              type: template
              icon: mdi:delete-clock
              content: >
                {% set ns = namespace(due=[]) %}
                {% set bins = [
                  ('Food', states('sensor.st_albans_collect_domestic_food_days_until_collection') | int(99)),
                  ('Garden', states('sensor.st_albans_collect_domestic_paid_garden_days_until_collection') | int(99)),
                  ('Recycling', states('sensor.st_albans_collect_domestic_recycling_days_until_collection') | int(99)),
                  ('Refuse', states('sensor.st_albans_collect_domestic_refuse_days_until_collection') | int(99))
                ] %}
                {% for name, days in bins %}{% if days <= 1 %}{% set ns.due = ns.due + [name] %}{% endif %}{% endfor %}
                {{ ns.due | join(' · ') }} tomorrow
              card_mod:
                style: |
                  ha-card {
                    --chip-background: color-mix(in srgb, var(--warning-color, #ff9800) 18%, transparent);
                    --color: var(--warning-color, #ff9800);
                    border: none;
                    border-radius: 999px;
                    box-shadow: none;
                  }
      - type: custom:paper-buttons-row
        styles:
          justify-content: flex-start
          align-items: center
          margin: 12px 12px 0 12px
        buttons:
          - layout: name
            name: Conditions
            styles:
              name:
                font-size: 20px
                font-weight: 600
                color: var(--primary-text-color)
              button:
                padding: 0
                background: none
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: weather.forecast_home
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Outside
              temp: >
                [[[
                  const t = entity?.attributes?.temperature;
                  return t != null ? `${Math.round(t * 10) / 10}°` : '—';
                ]]]
              sub: >
                [[[
                  const raw = entity?.state ?? '';
                  const cond = raw.replace(/_/g, ' ');
                  return cond.charAt(0).toUpperCase() + cond.slice(1);
                ]]]
            styles:
              card:
                - background: var(--md-sys-color-surface-container-low)
                - border-radius: 16px
                - border: none
                - box-shadow: none
                - padding: 16px
                - height: 120px
              grid:
                - grid-template-areas: '"label" "temp" "sub"'
                - grid-template-rows: auto 1fr auto
                - justify-items: start
                - align-items: start
              custom_fields:
                label:
                  - font-size: 10px
                  - font-weight: 700
                  - letter-spacing: 0.8px
                  - text-transform: uppercase
                  - color: rgba(255,255,255,0.38)
                  - text-align: left
                  - width: 100%
                temp:
                  - font-size: 34px
                  - font-weight: 700
                  - color: var(--primary-text-color)
                  - line-height: '1'
                  - letter-spacing: -0.5px
                  - margin-top: 6px
                  - text-align: left
                  - width: 100%
                sub:
                  - font-size: 11px
                  - color: rgba(255,255,255,0.48)
                  - margin-top: 6px
                  - line-height: '1.4'
                  - text-align: left
                  - width: 100%
          - type: custom:button-card
            entity: sensor.house_average_temperature
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Inside
              temp: >
                [[[
                  const t = parseFloat(entity?.state);
                  return isNaN(t) ? '—' : `${t.toFixed(1)}°`;
                ]]]
              sub: >
                [[[
                  const n = parseInt(states['sensor.house_heating_rooms']?.state) || 0;
                  const firing = states['binary_sensor.house_heating_boiler_firing']?.state === 'on';
                  const enabled = states['input_boolean.house_heating_enabled']?.state === 'on';
                  if (!enabled) return 'Heating off';
                  if (firing && n > 0) return `${n} room${n > 1 ? 's' : ''} heating`;
                  if (firing) return 'Heating';
                  return 'Idle';
                ]]]
            styles:
              card:
                - background: var(--md-sys-color-surface-container-low)
                - border-radius: 16px
                - border: none
                - box-shadow: none
                - padding: 16px
                - height: 120px
              grid:
                - grid-template-areas: '"label" "temp" "sub"'
                - grid-template-rows: auto 1fr auto
                - justify-items: start
                - align-items: start
              custom_fields:
                label:
                  - font-size: 10px
                  - font-weight: 700
                  - letter-spacing: 0.8px
                  - text-transform: uppercase
                  - color: rgba(255,255,255,0.38)
                  - text-align: left
                  - width: 100%
                temp:
                  - font-size: 34px
                  - font-weight: 700
                  - color: var(--primary-text-color)
                  - line-height: '1'
                  - letter-spacing: -0.5px
                  - margin-top: 6px
                  - text-align: left
                  - width: 100%
                sub:
                  - font-size: 11px
                  - color: rgba(255,255,255,0.48)
                  - margin-top: 6px
                  - text-align: left
                  - width: 100%
      - type: custom:paper-buttons-row
        styles:
          justify-content: flex-start
          align-items: center
          margin: 12px 12px 0 12px
        buttons:
          - layout: name
            name: Energy
            styles:
              name:
                font-size: 20px
                font-weight: 600
                color: var(--primary-text-color)
              button:
                padding: 0
                background: none
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Now
              value: >
                [[[
                  const r = parseFloat(entity?.state);
                  return isNaN(r) ? '—' : `${(r * 100).toFixed(1)}p`;
                ]]]
              sub: >
                [[[
                  const fmt = s => new Date(s).toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'});
                  const s = entity?.attributes?.start;
                  const e = entity?.attributes?.end;
                  return (s && e) ? `${fmt(s)} – ${fmt(e)}` : '';
                ]]]
            styles:
              card:
                - background: >
                    [[[
                      const p = parseFloat(entity?.state) * 100;
                      if (p < 0)   return 'color-mix(in srgb, #40916c 14%, var(--md-sys-color-surface-container-low))';
                      if (p < 10)  return 'color-mix(in srgb, #95d5b2 12%, var(--md-sys-color-surface-container-low))';
                      if (p < 20)  return 'color-mix(in srgb, #ffc14d 12%, var(--md-sys-color-surface-container-low))';
                      if (p <= 30) return 'color-mix(in srgb, #f4821f 12%, var(--md-sys-color-surface-container-low))';
                      return 'color-mix(in srgb, #ef5350 14%, var(--md-sys-color-surface-container-low))';
                    ]]]
                - border-radius: 16px
                - border: none
                - box-shadow: none
                - padding: 16px
                - height: 100px
                - cursor: default
              grid:
                - grid-template-areas: '"label" "value" "sub"'
                - grid-template-rows: auto 1fr auto
                - justify-items: start
                - align-items: start
              custom_fields:
                label:
                  - font-size: 10px
                  - font-weight: 700
                  - letter-spacing: 0.8px
                  - text-transform: uppercase
                  - color: rgba(255,255,255,0.38)
                  - text-align: left
                  - width: 100%
                value:
                  - font-size: 32px
                  - font-weight: 700
                  - letter-spacing: -1px
                  - line-height: '1'
                  - margin-top: 6px
                  - text-align: left
                  - width: 100%
                  - color: >
                      [[[
                        const p = parseFloat(entity?.state) * 100;
                        if (p < 0)   return '#40916c';
                        if (p < 10)  return '#95d5b2';
                        if (p < 20)  return '#ffc14d';
                        if (p <= 30) return '#f4821f';
                        return '#ef5350';
                      ]]]
                sub:
                  - font-size: 10px
                  - color: rgba(255,255,255,0.35)
                  - text-align: left
                  - width: 100%
                  - margin-top: 4px
          - type: custom:button-card
            entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_next_rate
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Next
              value: >
                [[[
                  const r = parseFloat(entity?.state);
                  return isNaN(r) ? '—' : `${(r * 100).toFixed(1)}p`;
                ]]]
              sub: >
                [[[
                  const fmt = s => new Date(s).toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'});
                  const s = entity?.attributes?.start;
                  const e = entity?.attributes?.end;
                  return (s && e) ? `${fmt(s)} – ${fmt(e)}` : '';
                ]]]
            styles:
              card:
                - background: >
                    [[[
                      const p = parseFloat(entity?.state) * 100;
                      if (p < 0)   return 'color-mix(in srgb, #40916c 14%, var(--md-sys-color-surface-container-low))';
                      if (p < 10)  return 'color-mix(in srgb, #95d5b2 12%, var(--md-sys-color-surface-container-low))';
                      if (p < 20)  return 'color-mix(in srgb, #ffc14d 12%, var(--md-sys-color-surface-container-low))';
                      if (p <= 30) return 'color-mix(in srgb, #f4821f 12%, var(--md-sys-color-surface-container-low))';
                      return 'color-mix(in srgb, #ef5350 14%, var(--md-sys-color-surface-container-low))';
                    ]]]
                - border-radius: 16px
                - border: none
                - box-shadow: none
                - padding: 16px
                - height: 100px
                - cursor: default
              grid:
                - grid-template-areas: '"label" "value" "sub"'
                - grid-template-rows: auto 1fr auto
                - justify-items: start
                - align-items: start
              custom_fields:
                label:
                  - font-size: 10px
                  - font-weight: 700
                  - letter-spacing: 0.8px
                  - text-transform: uppercase
                  - color: rgba(255,255,255,0.38)
                  - text-align: left
                  - width: 100%
                value:
                  - font-size: 32px
                  - font-weight: 700
                  - letter-spacing: -1px
                  - line-height: '1'
                  - margin-top: 6px
                  - text-align: left
                  - width: 100%
                  - color: >
                      [[[
                        const p = parseFloat(entity?.state) * 100;
                        if (p < 0)   return '#40916c';
                        if (p < 10)  return '#95d5b2';
                        if (p < 20)  return '#ffc14d';
                        if (p <= 30) return '#f4821f';
                        return '#ef5350';
                      ]]]
                sub:
                  - font-size: 10px
                  - color: rgba(255,255,255,0.35)
                  - text-align: left
                  - width: 100%
                  - margin-top: 4px
      - type: custom:button-card
        entity: binary_sensor.octopus_energy_target_cheapest_2h_waking_hours
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: more-info
        custom_fields:
          label: Cheapest 2h
          time: >
            [[[
              const active = entity?.state === 'on';
              const start = states['sensor.cheapest_2h_waking_start']?.state;
              const end = states['sensor.cheapest_2h_waking_end']?.state;
              if (active) return 'Running now';
              if (start && !['unknown','unavailable',''].includes(String(start).trim())) return `${start} → ${end}`;
              return 'Done for today';
            ]]]
          rate: >
            [[[
              const avg = parseFloat(states['sensor.cheapest_2h_waking_avg_rate']?.state);
              return isNaN(avg) ? '' : `avg ${avg.toFixed(1)}p/kWh`;
            ]]]
        styles:
          card:
            - background: >
                [[[
                  return entity?.state === 'on'
                    ? 'color-mix(in srgb, var(--md-sys-color-primary) 10%, var(--md-sys-color-surface-container-low))'
                    : 'var(--md-sys-color-surface-container-low)';
                ]]]
            - border-radius: 16px
            - border: none
            - box-shadow: none
            - padding: 14px 16px
            - cursor: default
          grid:
            - grid-template-areas: '"label rate" "time time"'
            - grid-template-columns: 1fr auto
            - grid-template-rows: auto auto
            - justify-items: start
            - align-items: center
          custom_fields:
            label:
              - font-size: 10px
              - font-weight: 700
              - letter-spacing: 0.8px
              - text-transform: uppercase
              - color: rgba(255,255,255,0.38)
              - text-align: left
              - width: 100%
            time:
              - font-size: 18px
              - font-weight: 600
              - color: var(--primary-text-color)
              - text-align: left
              - width: 100%
              - margin-top: 4px
            rate:
              - font-size: 11px
              - color: rgba(255,255,255,0.45)
              - text-align: right
              - white-space: nowrap
              - align-self: end
      - type: custom:button-card
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: navigate
          navigation_path: /mobile-dashboard/energy
        custom_fields:
          label: Live usage · rate chart · windows →
        styles:
          card:
            - background: transparent
            - border: 1px solid color-mix(in srgb, var(--primary-text-color) 10%, transparent)
            - border-radius: 16px
            - box-shadow: none
            - padding: 12px 16px
            - cursor: pointer
          grid:
            - grid-template-areas: '"label"'
            - justify-items: center
          custom_fields:
            label:
              - font-size: 12px
              - font-weight: 600
              - letter-spacing: 0.3px
              - color: rgba(255,255,255,0.45)
              - text-align: center
              - width: 100%
      - type: custom:paper-buttons-row
        styles:
          justify-content: flex-start
          align-items: center
          margin: 12px 12px 0 12px
        buttons:
          - layout: name
            name: Bins
            styles:
              name:
                font-size: 20px
                font-weight: 600
                color: var(--primary-text-color)
              button:
                padding: 0
                background: none
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: sensor.st_albans_collect_domestic_food_days_until_collection
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Food
              value: >
                [[[
                  const d = parseInt(entity?.state);
                  if (isNaN(d) || d >= 99) return '—';
                  if (d === 0) return 'Today';
                  if (d === 1) return 'Tomorrow';
                  return `${d}d`;
                ]]]
              sub: >
                [[[
                  const s = states['sensor.st_albans_collect_domestic_food_next_collection_date']?.state;
                  return (s && s !== 'unknown' && s !== 'unavailable') ? s : '';
                ]]]
            styles:
              card:
                - background: >
                    [[[
                      const d = parseInt(entity?.state);
                      return (!isNaN(d) && d <= 1)
                        ? 'color-mix(in srgb, #ff9800 10%, var(--md-sys-color-surface-container-low))'
                        : 'var(--md-sys-color-surface-container-low)';
                    ]]]
                - border-radius: 16px
                - border: none
                - box-shadow: none
                - padding: 16px
                - height: 90px
                - cursor: default
              grid:
                - grid-template-areas: '"label" "value" "sub"'
                - grid-template-rows: auto 1fr auto
                - justify-items: start
                - align-items: start
              custom_fields:
                label:
                  - font-size: 10px
                  - font-weight: 700
                  - letter-spacing: 0.8px
                  - text-transform: uppercase
                  - color: rgba(255,255,255,0.38)
                  - text-align: left
                  - width: 100%
                value:
                  - font-size: 24px
                  - font-weight: 700
                  - letter-spacing: -0.5px
                  - line-height: '1'
                  - margin-top: 4px
                  - text-align: left
                  - width: 100%
                  - color: >
                      [[[
                        const d = parseInt(entity?.state);
                        return (!isNaN(d) && d <= 1) ? '#ff9800' : 'var(--primary-text-color)';
                      ]]]
                sub:
                  - font-size: 10px
                  - color: rgba(255,255,255,0.35)
                  - text-align: left
                  - width: 100%
                  - margin-top: 2px
          - type: custom:button-card
            entity: sensor.st_albans_collect_domestic_paid_garden_days_until_collection
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Garden
              value: >
                [[[
                  const d = parseInt(entity?.state);
                  if (isNaN(d) || d < 0 || d >= 99) return '—';
                  if (d === 0) return 'Today';
                  if (d === 1) return 'Tomorrow';
                  return `${d}d`;
                ]]]
              sub: >
                [[[
                  const s = states['sensor.st_albans_collect_domestic_paid_garden_next_collection_date']?.state;
                  return (s && s !== 'unknown' && s !== 'unavailable') ? s : '';
                ]]]
            styles:
              card:
                - background: >
                    [[[
                      const d = parseInt(entity?.state);
                      return (!isNaN(d) && d >= 0 && d <= 1)
                        ? 'color-mix(in srgb, #ff9800 10%, var(--md-sys-color-surface-container-low))'
                        : 'var(--md-sys-color-surface-container-low)';
                    ]]]
                - border-radius: 16px
                - border: none
                - box-shadow: none
                - padding: 16px
                - height: 90px
                - cursor: default
              grid:
                - grid-template-areas: '"label" "value" "sub"'
                - grid-template-rows: auto 1fr auto
                - justify-items: start
                - align-items: start
              custom_fields:
                label:
                  - font-size: 10px
                  - font-weight: 700
                  - letter-spacing: 0.8px
                  - text-transform: uppercase
                  - color: rgba(255,255,255,0.38)
                  - text-align: left
                  - width: 100%
                value:
                  - font-size: 24px
                  - font-weight: 700
                  - letter-spacing: -0.5px
                  - line-height: '1'
                  - margin-top: 4px
                  - text-align: left
                  - width: 100%
                  - color: >
                      [[[
                        const d = parseInt(entity?.state);
                        return (!isNaN(d) && d >= 0 && d <= 1) ? '#ff9800' : 'var(--primary-text-color)';
                      ]]]
                sub:
                  - font-size: 10px
                  - color: rgba(255,255,255,0.35)
                  - text-align: left
                  - width: 100%
                  - margin-top: 2px
          - type: custom:button-card
            entity: sensor.st_albans_collect_domestic_recycling_days_until_collection
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Recycling
              value: >
                [[[
                  const d = parseInt(entity?.state);
                  if (isNaN(d) || d >= 99) return '—';
                  if (d === 0) return 'Today';
                  if (d === 1) return 'Tomorrow';
                  return `${d}d`;
                ]]]
              sub: >
