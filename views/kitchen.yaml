title: Kitchen
type: sections
max_columns: 1
path: kitchen
sections:
  - type: grid
    cards:
      - type: custom:streamline-card
        template: room_header_stack
        variables:
          navigation_path: /mobile-dashboard
          title: Kitchen
          room_motion_sensor: binary_sensor.kitchen_occupied
          room_climate_entity: climate.kitchen_trv
          room_temp_sensor: sensor.kitchen_sensor_climate_temperature
          popup_hash: '#kitchen-settings'
      - type: custom:streamline-card
        template: spacer_card
        variables:
          padding: 16px
      - type: custom:streamline-card
        template: room_tabs_scaffold
        variables:
          room_tab_cards:
            - type: custom:streamline-card
              template: lighting_scenes_section_2
              variables:
                scene_1_entity: scene.kitchen_all
                scene_1_name: All
                scene_2_entity: scene.kitchen_cabinets
                scene_2_name: Cabinets
                scene_off_entity: scene.kitchen_off
                scene_off_name: 'Off'
                lights_group: group.kitchen_lights
                popup_hash: '#kitchen-lights'
                room: kitchen
            - type: vertical-stack
              cards:
                - type: custom:streamline-card
                  template: media_title_card
                  variables:
                    title: Media
                    player_1_entity: media_player.kitchen
                - type: grid
                  columns: 1
                  square: false
                  cards:
                    - type: custom:streamline-card
                      template: media_player_card
                      variables:
                        entity: media_player.kitchen
                        name: Sonos
                        icon: mdi:speaker-wireless
          climate_tab_cards:
            - type: custom:streamline-card
              template: heating_mode_section
              variables:
                room: kitchen
                climate_entity: climate.kitchen_trv
                temp_sensor: sensor.kitchen_sensor_climate_temperature
                humidity_entity: sensor.kitchen_sensor_climate_humidity
  - type: grid
    cards:
      - type: custom:streamline-card
        template: rooms_popup
      - type: custom:streamline-card
        template: lights_popup_scaffold
        variables:
          popup_hash: '#kitchen-lights'
          off_scene: scene.kitchen_off
          off_label: All off
          popup_cards:
            - type: custom:streamline-card
              template: section_title
              variables:
                title: Cabinets
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:streamline-card
                  template: popup_switch_button
                  variables:
                    entity: switch.kitchen_light_cabinets
                    name: Under cabinet
                - type: custom:streamline-card
                  template: popup_light_slider
                  variables:
                    entity: light.kitchen_light_cooker
                    name: Cooker hood
            - type: custom:streamline-card
              template: section_title
              variables:
                title: Main light
            - type: grid
              columns: 1
              square: false
              cards:
                - type: custom:streamline-card
                  template: popup_light_slider
                  variables:
                    entity: light.kitchen_light_ceiling
                    name: Ceiling
      - type: custom:streamline-card
        template: page_footer
        variables:
          active: rooms
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#kitchen-settings'
        show_header: false
        cards:
          - type: custom:streamline-card
            template: popup_header
            variables:
              title: Kitchen Settings
          - type: custom:streamline-card
            template: sonos_follow_section
            variables:
              toggle_entity: input_boolean.kitchen_automation_sonos_enabled
              room_player: media_player.kitchen
              grouped_entity: binary_sensor.kitchen_grouped_with_parlour
          - type: custom:streamline-card
            template: presence_section
            variables:
              occupied_entity: binary_sensor.kitchen_occupied
              pir_entity: binary_sensor.kitchen_sensor_motion_occupancy
              motion_enabled_entity: input_boolean.kitchen_sensor_motion_enabled
              override_entity: input_boolean.kitchen_automation_presence_override
              contained_entity: binary_sensor.kitchen_occupied_contained
              reason_1_entity: input_boolean.kitchen_automation_presence_override
              reason_1_state: 'on'
              reason_1_icon: m3of:person
              reason_1_label: Override active
              reason_2_entity: binary_sensor.kitchen_occupied_contained
              reason_2_state: 'on'
              reason_2_icon: m3of:meeting-room
              reason_2_label: Contained
          - type: custom:streamline-card
            template: lighting_automation_section_sleep_hold
            variables:
              toggle_entity: input_boolean.kitchen_automation_lights_enabled
          - type: custom:streamline-card
            template: heating_automation_section
            variables:
              toggle_entity: input_boolean.kitchen_automation_heating_enabled
              heating_hold_entity: binary_sensor.kitchen_external_openings
