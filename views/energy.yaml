                          - text-align: left
                          - width: 100%
                          - margin-top: 4px
                        rate:
                          - font-size: 11px
                          - color: rgba(255,255,255,0.45)
                          - text-align: right
                          - white-space: nowrap
                          - align-self: end
                  - type: custom:button-card
                    show_icon: false
                    show_name: false
                    show_state: false
                    custom_fields:
                      label: Cheap windows
                      windows: >
                        [[[
                          return (() => {
                            const available = states['binary_sensor.octopus_tomorrow_data_available']?.state === 'on';
                            if (!available) return '<div style="color:rgba(255,255,255,0.25);font-size:13px">Rates from ~4pm</div>';
                            const neg = states['sensor.octopus_tomorrow_negative_windows']?.state;
                            const cheap = states['sensor.octopus_tomorrow_cheap_windows']?.state;
                            const hasNeg = neg && neg !== '—';
                            const hasCheap = cheap && cheap !== '—';
                            const negPart = hasNeg ? `<div style="color:#86efac;font-weight:600;font-size:13px;line-height:1.6">${neg.replace(/ · /g, '<br>')}</div>` : '';
                            const cheapPart = hasCheap ? `<div style="color:rgba(255,255,255,0.65);font-size:13px;line-height:1.6;margin-top:${hasNeg ? '6px' : '0'}">${cheap.replace(/ · /g, '<br>')}</div>` : '';
                            return negPart + cheapPart || '<div style="color:rgba(255,255,255,0.25);font-size:13px">No cheap windows tomorrow</div>';
                          })();
                        ]]]
                    styles:
                      card:
                        - background: transparent
                        - border-radius: 0
                        - border: none
                        - border-top: 1px solid rgba(255,255,255,0.07)
                        - box-shadow: none
                        - padding: 14px 4px
