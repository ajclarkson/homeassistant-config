title: Energy
type: sections
max_columns: 1
path: energy
sections:
  - type: grid
    cards:
      - type: custom:paper-buttons-row
        styles:
          justify-content: flex-start
          gap: 10px
          align-items: center
          margin: 0 12px 0 12px
        buttons:
          - layout: name
            name: Energy
            styles:
              name:
                font-size: 30px
                font-weight: 700
                color: var(--primary-text-color)
              button:
                padding: 0
                background: none
          - layout: name
            name: >
              {% set p = states('sensor.glow_electricity_power') | float(0) %}
              {% set r = states('sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate') | float(0) * 100 %}
              ● {{ (p * r / 100) | round(2) }}p/min
            styles:
              name:
                font-size: 11px
                font-weight: 600
                letter-spacing: 0.3px
                color: >
                  {% set r = states('sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate') | float(0) * 100 %}
                  {% if r < 0 %}#40916c{% elif r < 10 %}#95d5b2{% elif r < 20 %}#ffc14d{% elif r <= 30 %}#f4821f{% else %}#ef5350{% endif %}
              button:
                padding: 3px 8px
                background: >
                  {% set r = states('sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate') | float(0) * 100 %}
                  {% if r < 0 %}color-mix(in srgb, #40916c 12%, transparent){% elif r < 10 %}color-mix(in srgb, #95d5b2 10%, transparent){% elif r < 20 %}color-mix(in srgb, #ffc14d 10%, transparent){% elif r <= 30 %}color-mix(in srgb, #f4821f 10%, transparent){% else %}color-mix(in srgb, #ef5350 10%, transparent){% endif %}
                border-radius: 999px
      - type: custom:streamline-card
        template: spacer_card
        variables:
          padding: 8px

      # ── Live power ──
      - type: custom:button-card
        entity: sensor.glow_electricity_power
        show_icon: false
        show_name: false
        show_state: false
        tap_action:
          action: none
        custom_fields:
          power: >
            [[[
              const p = parseFloat(entity?.state);
              return isNaN(p) ? '—' : `${p.toFixed(2)} kW`;
            ]]]
          sub: >
            [[[
              const r = parseFloat(states['sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate']?.state);
              const rp = isNaN(r) ? null : (r * 100).toFixed(1);
              const p = parseFloat(entity?.state);
              const costPerMin = (!isNaN(r) && !isNaN(p)) ? ((p * r / 60) * 100).toFixed(1) : null;
              const parts = [];
              if (rp) parts.push(`${rp}p/kWh now`);
              if (costPerMin) parts.push(`~${costPerMin}p/min`);
              return parts.join(' · ');
            ]]]
        styles:
          card:
            - background: transparent
            - box-shadow: none
            - border: none
            - padding: 4px 12px 0 12px
            - cursor: default
          grid:
            - grid-template-areas: '"power" "sub"'
            - grid-template-rows: auto auto
            - justify-items: start
          custom_fields:
            power:
              - font-size: 54px
              - font-weight: 700
              - color: var(--primary-text-color)
              - line-height: '1'
              - letter-spacing: -2px
            sub:
              - font-size: 13px
              - color: rgba(255,255,255,0.45)
              - margin-top: 6px

      # ── Current / Next rate ──
      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:button-card
            entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Now
              value: >
                [[[
                  const r = parseFloat(entity?.state);
                  return isNaN(r) ? '—' : `${(r * 100).toFixed(1)}p`;
                ]]]
              sub: >
                [[[
                  const fmt = s => new Date(s).toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'});
                  const s = entity?.attributes?.start;
                  const e = entity?.attributes?.end;
                  return (s && e) ? `${fmt(s)} – ${fmt(e)}` : '';
                ]]]
            styles:
              card:
                - background: >
                    [[[
                      const p = parseFloat(entity?.state) * 100;
                      if (p < 0)   return 'color-mix(in srgb, #40916c 14%, var(--md-sys-color-surface-container-low))';
                      if (p < 10)  return 'color-mix(in srgb, #95d5b2 12%, var(--md-sys-color-surface-container-low))';
                      if (p < 20)  return 'color-mix(in srgb, #ffc14d 12%, var(--md-sys-color-surface-container-low))';
                      if (p <= 30) return 'color-mix(in srgb, #f4821f 12%, var(--md-sys-color-surface-container-low))';
                      return 'color-mix(in srgb, #ef5350 14%, var(--md-sys-color-surface-container-low))';
                    ]]]
                - border-radius: 16px
                - border: none
                - box-shadow: none
                - padding: 16px
                - height: 100px
                - cursor: default
              grid:
                - grid-template-areas: '"label" "value" "sub"'
                - grid-template-rows: auto 1fr auto
                - justify-items: start
                - align-items: start
              custom_fields:
                label:
                  - font-size: 10px
                  - font-weight: 700
                  - letter-spacing: 0.8px
                  - text-transform: uppercase
                  - color: rgba(255,255,255,0.38)
                  - text-align: left
                  - width: 100%
                value:
                  - font-size: 32px
                  - font-weight: 700
                  - letter-spacing: -1px
                  - line-height: '1'
                  - margin-top: 6px
                  - text-align: left
                  - width: 100%
                  - color: >
                      [[[
                        const p = parseFloat(entity?.state) * 100;
                        if (p < 0)   return '#40916c';
                        if (p < 10)  return '#95d5b2';
                        if (p < 20)  return '#ffc14d';
                        if (p <= 30) return '#f4821f';
                        return '#ef5350';
                      ]]]
                sub:
                  - font-size: 10px
                  - color: rgba(255,255,255,0.35)
                  - text-align: left
                  - width: 100%
                  - margin-top: 4px
          - type: custom:button-card
            entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_next_rate
            show_icon: false
            show_name: false
            show_state: false
            tap_action:
              action: more-info
            custom_fields:
              label: Next
              value: >
                [[[
                  const r = parseFloat(entity?.state);
                  return isNaN(r) ? '—' : `${(r * 100).toFixed(1)}p`;
                ]]]
              sub: >
                [[[
                  const fmt = s => new Date(s).toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'});
                  const s = entity?.attributes?.start;
                  const e = entity?.attributes?.end;
                  return (s && e) ? `${fmt(s)} – ${fmt(e)}` : '';
                ]]]
            styles:
              card:
                - background: >
                    [[[
                      const p = parseFloat(entity?.state) * 100;
                      if (p < 0)   return 'color-mix(in srgb, #40916c 14%, var(--md-sys-color-surface-container-low))';
                      if (p < 10)  return 'color-mix(in srgb, #95d5b2 12%, var(--md-sys-color-surface-container-low))';
                      if (p < 20)  return 'color-mix(in srgb, #ffc14d 12%, var(--md-sys-color-surface-container-low))';
                      if (p <= 30) return 'color-mix(in srgb, #f4821f 12%, var(--md-sys-color-surface-container-low))';
                      return 'color-mix(in srgb, #ef5350 14%, var(--md-sys-color-surface-container-low))';
                    ]]]
                - border-radius: 16px
                - border: none
                - box-shadow: none
                - padding: 16px
                - height: 100px
                - cursor: default
              grid:
                - grid-template-areas: '"label" "value" "sub"'
                - grid-template-rows: auto 1fr auto
                - justify-items: start
                - align-items: start
              custom_fields:
                label:
                  - font-size: 10px
                  - font-weight: 700
                  - letter-spacing: 0.8px
                  - text-transform: uppercase
                  - color: rgba(255,255,255,0.38)
                  - text-align: left
                  - width: 100%
                value:
                  - font-size: 32px
                  - font-weight: 700
                  - letter-spacing: -1px
                  - line-height: '1'
                  - margin-top: 6px
                  - text-align: left
                  - width: 100%
                  - color: >
                      [[[
                        const p = parseFloat(entity?.state) * 100;
                        if (p < 0)   return '#40916c';
                        if (p < 10)  return '#95d5b2';
                        if (p < 20)  return '#ffc14d';
                        if (p <= 30) return '#f4821f';
                        return '#ef5350';
                      ]]]
                sub:
                  - font-size: 10px
                  - color: rgba(255,255,255,0.35)
                  - text-align: left
                  - width: 100%
                  - margin-top: 4px

      # ── Today / Tomorrow tabs ──
      - type: custom:mod-card
        card_mod:
          style:
            .: |
              ha-card {
                background: var(--md-sys-color-surface-container);
                border-radius: 20px;
                border: none;
                box-shadow: none;
                overflow: hidden;
                padding: 0;
              }
            simple-tabs$: |
              .tabs-container {
                display: block !important;
              }
              .tabs {
                display: flex !important;
                width: 100% !important;
                border-bottom: 2px solid rgba(255, 255, 255, 0.1);
              }
              .tab-button {
                flex: 1 !important;
                text-align: center;
                border: none !important;
                outline: none !important;
                border-radius: 0 !important;
                border-bottom: 2px solid transparent !important;
                margin-bottom: -2px;
                padding: 10px 8px;
              }
              .tab-button.active {
                border-bottom: 2px solid var(--primary-text-color) !important;
              }
              .content-container {
                padding: 12px 12px 4px;
              }
        card:
          type: custom:simple-tabs
          pre-load: true
          active-background: transparent
          active-text-color: var(--primary-text-color)
          text-color: rgba(255,255,255,0.45)
          tabs:
            - title: Today
              icon: m3of:today
              card:
                type: vertical-stack
                cards:
                  - type: custom:apexcharts-card
                    header:
                      show: false
                    graph_span: 24h
                    span:
                      start: day
                    now:
                      show: true
                      label: ''
                    apex_config:
                      chart:
                        height: 140
                        stacked: true
                        toolbar:
                          show: false
                        zoom:
                          enabled: false
                      plotOptions:
                        bar:
                          columnWidth: 90%
                          borderRadius: 1
                      dataLabels:
                        enabled: false
                      stroke:
                        show: false
                      legend:
                        show: false
                      grid:
                        show: true
                        borderColor: rgba(255,255,255,0.05)
                        xaxis:
                          lines:
                            show: false
                        yaxis:
                          lines:
                            show: true
                        padding:
                          left: 0
                          right: 0
                          top: 4
                          bottom: 0
                      xaxis:
                        type: datetime
                        tickAmount: 4
                        axisBorder:
                          show: false
                        axisTicks:
                          show: false
                        labels:
                          datetimeUTC: false
                          format: HH:mm
                          style:
                            colors: rgba(255,255,255,0.40)
                            fontSize: 10px
                      yaxis:
                        decimalsInFloat: 0
                        axisBorder:
                          show: false
                        axisTicks:
                          show: false
                        labels:
                          style:
                            colors: rgba(255,255,255,0.40)
                            fontSize: 10px
                      tooltip:
                        x:
                          format: HH:mm
                    series:
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Negative
                        type: column
                        color: '#40916c'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_current_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => ({ x: Date.parse(r.start), y: Number(r.value_inc_vat) * 100 < 0 ? Number(r.value_inc_vat) * 100 : null }));
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Cheap
                        type: column
                        color: '#95d5b2'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_current_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => { const v = Number(r.value_inc_vat) * 100; return { x: Date.parse(r.start), y: (v >= 0 && v < 10) ? v : null }; });
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Mild
                        type: column
                        color: '#ffc14d'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_current_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => { const v = Number(r.value_inc_vat) * 100; return { x: Date.parse(r.start), y: (v >= 10 && v < 20) ? v : null }; });
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Pricey
                        type: column
                        color: '#f4821f'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_current_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => { const v = Number(r.value_inc_vat) * 100; return { x: Date.parse(r.start), y: (v >= 20 && v <= 30) ? v : null }; });
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Expensive
                        type: column
                        color: '#ef5350'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_current_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => { const v = Number(r.value_inc_vat) * 100; return { x: Date.parse(r.start), y: v > 30 ? v : null }; });
                    card_mod:
                      style: |
                        ha-card {
                          border: none;
                          background: transparent;
                          box-shadow: none;
                        }
                  - type: custom:button-card
                    entity: binary_sensor.octopus_energy_target_cheapest_2h_waking_hours
                    show_icon: false
                    show_name: false
                    show_state: false
                    tap_action:
                      action: more-info
                    custom_fields:
                      label: Cheapest 2h window
                      time: >
                        [[[
                          const active = entity?.state === 'on';
                          const start = states['sensor.cheapest_2h_waking_start']?.state;
                          const end = states['sensor.cheapest_2h_waking_end']?.state;
                          if (active) return 'Running now';
                          if (start && !['unknown','unavailable',''].includes(String(start).trim())) return `${start} → ${end}`;
                          return 'Done for today';
                        ]]]
                      rate: >
                        [[[
                          const avg = parseFloat(states['sensor.cheapest_2h_waking_avg_rate']?.state);
                          return isNaN(avg) ? '' : `avg ${avg.toFixed(1)}p/kWh`;
                        ]]]
                    styles:
                      card:
                        - background: transparent
                        - border-radius: 0
                        - border: none
                        - border-top: 1px solid rgba(255,255,255,0.07)
                        - box-shadow: none
                        - padding: 14px 4px
                        - cursor: default
                      grid:
                        - grid-template-areas: '"label rate" "time time"'
                        - grid-template-columns: 1fr auto
                        - grid-template-rows: auto auto
                        - justify-items: start
                        - align-items: center
                      custom_fields:
                        label:
                          - font-size: 10px
                          - font-weight: 700
                          - letter-spacing: 0.8px
                          - text-transform: uppercase
                          - color: rgba(255,255,255,0.38)
                          - text-align: left
                          - width: 100%
                        time:
                          - font-size: 18px
                          - font-weight: 600
                          - color: var(--primary-text-color)
                          - text-align: left
                          - width: 100%
                          - margin-top: 4px
                        rate:
                          - font-size: 11px
                          - color: rgba(255,255,255,0.45)
                          - text-align: right
                          - white-space: nowrap
                          - align-self: end
                  - type: custom:button-card
                    show_icon: false
                    show_name: false
                    show_state: false
                    custom_fields:
                      label: Cheap windows
                      windows: >
                        [[[
                          return (() => {
                            const neg = states['sensor.octopus_today_negative_windows']?.state;
                            const cheap = states['sensor.octopus_today_cheap_windows']?.state;
                            const hasNeg = neg && neg !== '—';
                            const hasCheap = cheap && cheap !== '—';
                            const negPart = hasNeg ? `<div style="color:#86efac;font-weight:600;font-size:13px;line-height:1.6">${neg.replace(/ · /g, '<br>')}</div>` : '';
                            const cheapPart = hasCheap ? `<div style="color:rgba(255,255,255,0.65);font-size:13px;line-height:1.6;margin-top:${hasNeg ? '6px' : '0'}">${cheap.replace(/ · /g, '<br>')}</div>` : '';
                            return negPart + cheapPart || '<div style="color:rgba(255,255,255,0.25);font-size:13px">No cheap windows today</div>';
                          })();
                        ]]]
                    styles:
                      card:
                        - background: transparent
                        - border-radius: 0
                        - border: none
                        - border-top: 1px solid rgba(255,255,255,0.07)
                        - box-shadow: none
                        - padding: 14px 4px
                      grid:
                        - grid-template-areas: '"label" "windows"'
                        - grid-template-rows: auto 1fr
                        - justify-items: start
                        - align-items: start
                      custom_fields:
                        label:
                          - font-size: 10px
                          - font-weight: 700
                          - letter-spacing: 0.8px
                          - text-transform: uppercase
                          - color: rgba(255,255,255,0.38)
                          - text-align: left
                          - width: 100%
                        windows:
                          - margin-top: 8px
                          - text-align: left
                          - width: 100%
            - title: Tomorrow
              icon: m3of:calendar-today
              card:
                type: vertical-stack
                cards:
                  - type: custom:apexcharts-card
                    header:
                      show: false
                    graph_span: 24h
                    span:
                      start: day
                      offset: +1d
                    apex_config:
                      chart:
                        height: 140
                        stacked: true
                        toolbar:
                          show: false
                        zoom:
                          enabled: false
                      plotOptions:
                        bar:
                          columnWidth: 90%
                          borderRadius: 1
                      dataLabels:
                        enabled: false
                      stroke:
                        show: false
                      legend:
                        show: false
                      grid:
                        show: true
                        borderColor: rgba(255,255,255,0.05)
                        xaxis:
                          lines:
                            show: false
                        yaxis:
                          lines:
                            show: true
                        padding:
                          left: 0
                          right: 0
                          top: 4
                          bottom: 0
                      xaxis:
                        type: datetime
                        tickAmount: 4
                        axisBorder:
                          show: false
                        axisTicks:
                          show: false
                        labels:
                          datetimeUTC: false
                          format: HH:mm
                          style:
                            colors: rgba(255,255,255,0.40)
                            fontSize: 10px
                      yaxis:
                        decimalsInFloat: 0
                        axisBorder:
                          show: false
                        axisTicks:
                          show: false
                        labels:
                          style:
                            colors: rgba(255,255,255,0.40)
                            fontSize: 10px
                      tooltip:
                        x:
                          format: HH:mm
                    series:
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Negative
                        type: column
                        color: '#40916c'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_next_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => ({ x: Date.parse(r.start), y: Number(r.value_inc_vat) * 100 < 0 ? Number(r.value_inc_vat) * 100 : null }));
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Cheap
                        type: column
                        color: '#95d5b2'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_next_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => { const v = Number(r.value_inc_vat) * 100; return { x: Date.parse(r.start), y: (v >= 0 && v < 10) ? v : null }; });
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Mild
                        type: column
                        color: '#ffc14d'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_next_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => { const v = Number(r.value_inc_vat) * 100; return { x: Date.parse(r.start), y: (v >= 10 && v < 20) ? v : null }; });
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Pricey
                        type: column
                        color: '#f4821f'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_next_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => { const v = Number(r.value_inc_vat) * 100; return { x: Date.parse(r.start), y: (v >= 20 && v <= 30) ? v : null }; });
                      - entity: sensor.octopus_energy_electricity_24e8140196_1012483035417_current_rate
                        name: Expensive
                        type: column
                        color: '#ef5350'
                        show:
                          legend_value: false
                        data_generator: |
                          const rates = hass.states['event.octopus_energy_electricity_24e8140196_1012483035417_next_day_rates']?.attributes?.rates ?? [];
                          return rates.map(r => { const v = Number(r.value_inc_vat) * 100; return { x: Date.parse(r.start), y: v > 30 ? v : null }; });
                    card_mod:
                      style: |
                        ha-card {
                          border: none;
                          background: transparent;
                          box-shadow: none;
                        }
                  - type: custom:button-card
                    entity: binary_sensor.octopus_tomorrow_data_available
                    show_icon: false
                    show_name: false
                    show_state: false
                    tap_action:
                      action: none
                    custom_fields:
                      label: Best 2h window
                      time: >
                        [[[
                          const available = entity?.state === 'on';
                          if (!available) return 'Rates from ~4pm';
                          const rates = (states['event.octopus_energy_electricity_24e8140196_1012483035417_next_day_rates']?.attributes?.rates ?? [])
                            .filter(r => { const h = new Date(r.start).getHours(); return h >= 6 && h < 22; });
                          if (rates.length < 4) return '—';
                          let best = null, bestAvg = Infinity;
                          for (let i = 0; i <= rates.length - 4; i++) {
                            const w = rates.slice(i, i + 4);
                            const avg = w.reduce((s, r) => s + Number(r.value_inc_vat), 0) / 4;
                            if (avg < bestAvg) { bestAvg = avg; best = w; }
                          }
                          if (!best) return '—';
                          const fmt = s => new Date(s).toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'});
                          return `${fmt(best[0].start)} → ${fmt(best[best.length-1].end)}`;
                        ]]]
                      rate: >
                        [[[
                          const available = entity?.state === 'on';
                          if (!available) return '';
                          const rates = (states['event.octopus_energy_electricity_24e8140196_1012483035417_next_day_rates']?.attributes?.rates ?? [])
                            .filter(r => { const h = new Date(r.start).getHours(); return h >= 6 && h < 22; });
                          if (rates.length < 4) return '';
                          let bestAvg = Infinity;
                          for (let i = 0; i <= rates.length - 4; i++) {
                            const avg = rates.slice(i, i + 4).reduce((s, r) => s + Number(r.value_inc_vat), 0) / 4;
                            if (avg < bestAvg) bestAvg = avg;
                          }
                          return isFinite(bestAvg) ? `avg ${(bestAvg * 100).toFixed(1)}p/kWh` : '';
                        ]]]
                    styles:
                      card:
                        - background: transparent
                        - border-radius: 0
                        - border: none
                        - border-top: 1px solid rgba(255,255,255,0.07)
                        - box-shadow: none
                        - padding: 14px 4px
                        - cursor: default
                      grid:
                        - grid-template-areas: '"label rate" "time time"'
                        - grid-template-columns: 1fr auto
                        - grid-template-rows: auto auto
