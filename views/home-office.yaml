title: Home Office
type: sections
max_columns: 1
path: home-office
sections:
  - type: grid
    cards:
      - type: custom:streamline-card
        template: room_header_stack
        variables:
          navigation_path: /mobile-dashboard
          title: Home Office
          room_motion_sensor: binary_sensor.home_office_occupied
          room_climate_entity: climate.home_office_trv
          room_temp_sensor: sensor.home_office_sensor_climate_temperature
          popup_hash: '#home-office-settings'
      - type: custom:streamline-card
        template: spacer_card
        variables:
          padding: 16px
      - type: custom:streamline-card
        template: room_tabs_scaffold
        variables:
          room_tab_cards:
            - type: custom:streamline-card
              template: lighting_scenes_section_2
              variables:
                scene_1_entity: scene.home_office_all
                scene_1_name: All
                scene_2_entity: scene.home_office_lamps
                scene_2_name: Lamps
                scene_off_entity: scene.home_office_off
                scene_off_name: 'Off'
                lights_group: group.home_office_lights
                popup_hash: '#home-office-lights'
                room: home_office
            - type: vertical-stack
              cards:
                - type: custom:streamline-card
                  template: media_title_card
                  variables:
                    title: Media
                    player_1_entity: media_player.home_office
                - type: grid
                  columns: 1
                  square: false
                  cards:
                    - type: custom:streamline-card
                      template: media_player_card
                      variables:
                        entity: media_player.home_office
                        name: Sonos
                        icon: mdi:speaker-wireless
          climate_tab_cards:
            - type: custom:streamline-card
              template: heating_mode_section
              variables:
                room: home_office
                climate_entity: climate.home_office_trv
                temp_sensor: sensor.home_office_sensor_climate_temperature
                humidity_entity: sensor.home_office_sensor_climate_humidity
  - type: grid
    cards:
      - type: custom:streamline-card
        template: rooms_popup
      - type: custom:streamline-card
        template: lights_popup_scaffold
        variables:
          popup_hash: '#home-office-lights'
          off_scene: scene.home_office_off
          off_label: All off
          popup_cards:
            - type: custom:streamline-card
              template: section_title
              variables:
                title: Lamps
            - type: grid
              columns: 2
              square: false
              cards:
                - type: custom:streamline-card
                  template: popup_light_slider
                  variables:
                    entity: light.home_office_light_desk_lamp
                    name: Desk lamp
                - type: custom:streamline-card
                  template: popup_light_slider
                  variables:
                    entity: light.home_office_light_floor_lamp
                    name: Floor lamp
            - type: custom:streamline-card
              template: section_title
              variables:
                title: Main light
            - type: grid
              columns: 1
              square: false
              cards:
                - type: custom:streamline-card
                  template: popup_light_slider
                  variables:
                    entity: light.home_office_light_ceiling
                    name: Ceiling
      - type: custom:streamline-card
        template: page_footer
        variables:
          active: rooms
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#home-office-settings'
        show_header: false
        cards:
          - type: custom:streamline-card
            template: popup_header
            variables:
              title: Home Office Settings
          - type: custom:streamline-card
            template: sonos_follow_section
            variables:
              toggle_entity: input_boolean.home_office_automation_sonos_enabled
              room_player: media_player.home_office
              grouped_entity: binary_sensor.home_office_grouped_with_parlour
          - type: custom:streamline-card
            template: presence_section
            variables:
              occupied_entity: binary_sensor.home_office_occupied
              pir_entity: binary_sensor.home_office_sensor_motion_occupancy
              motion_enabled_entity: input_boolean.home_office_sensor_motion_enabled
              override_entity: input_boolean.home_office_automation_presence_override
              contained_entity: binary_sensor.home_office_occupied_contained
              reason_1_entity: input_boolean.home_office_automation_presence_override
              reason_1_state: 'on'
              reason_1_icon: m3of:person
              reason_1_label: Override active
              reason_2_entity: binary_sensor.home_office_occupied_contained
              reason_2_state: 'on'
              reason_2_icon: m3of:meeting-room
              reason_2_label: Doors closed
              reason_3_entity: media_player.home_office
              reason_3_state: playing
              reason_3_icon: m3of:music-note
              reason_3_label: Sonos playing
              reason_4_entity: binary_sensor.home_office_monitor
              reason_4_state: 'on'
              reason_4_icon: m3of:desktop-windows
              reason_4_label: Monitor on
          - type: custom:streamline-card
            template: lighting_automation_section_sleep_hold
            variables:
              toggle_entity: input_boolean.home_office_automation_lights_enabled
          - type: custom:streamline-card
            template: heating_automation_section
            variables:
              toggle_entity: input_boolean.home_office_automation_heating_enabled
              heating_hold_entity: binary_sensor.home_office_external_openings
