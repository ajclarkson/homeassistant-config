title: Hallway
type: sections
max_columns: 1
path: hallway
sections:
  - type: grid
    cards:
      - type: custom:streamline-card
        template: room_header_stack
        variables:
          navigation_path: /mobile-dashboard
          title: Hallway
          room_motion_sensor: binary_sensor.hallway_downstairs_occupied
          room_climate_entity: climate.hallway_trv
          room_temp_sensor: sensor.hallway_downstairs_sensor_motion_temperature
          popup_hash: '#hallway-settings'
      - type: custom:streamline-card
        template: spacer_card
        variables:
          padding: 16px
      - type: custom:streamline-card
        template: room_tabs_scaffold
        variables:
          room_tab_cards:
            - type: custom:streamline-card
              template: lighting_scenes_section_2
              variables:
                title: Lighting - Downstairs
                scene_1_entity: scene.hallway_downstairs_daylight
                scene_1_name: Daylight
                scene_2_entity: scene.hallway_downstairs_low
                scene_2_name: Low
                scene_off_entity: scene.hallway_downstairs_off
                scene_off_name: 'Off'
                lights_group: group.hallway_downstairs_lights
                popup_hash: '#hallway-downstairs-lights'
                room: hallway_downstairs
            - type: custom:streamline-card
              template: lighting_scenes_section_2
              variables:
                title: Lighting - Upstairs
                scene_1_entity: scene.hallway_upstairs_daylight
                scene_1_name: Daylight
                scene_2_entity: scene.hallway_upstairs_low
                scene_2_name: Low
                scene_off_entity: scene.hallway_upstairs_off
                scene_off_name: 'Off'
                lights_group: group.hallway_upstairs_lights
                popup_hash: '#hallway-upstairs-lights'
                room: hallway_upstairs
          climate_tab_cards:
            - type: custom:streamline-card
              template: heating_mode_section
              variables:
                room: hallway_downstairs
                climate_entity: climate.hallway_trv
                temp_sensor: sensor.hallway_downstairs_sensor_motion_temperature
                humidity_entity: sensor.hallway_upstairs_sensor_climate_humidity
  - type: grid
    cards:
      - type: custom:streamline-card
        template: rooms_popup
      - type: custom:streamline-card
        template: lights_popup_section
        variables:
          popup_hash: '#hallway-downstairs-lights'
          off_scene: scene.hallway_downstairs_off
          off_label: All off
          popup_cards:
            - type: custom:streamline-card
              template: section_title
              variables:
                title: Downstairs light
            - type: grid
              columns: 1
              square: false
              cards:
                - type: custom:material-slider-card
                  control_type: light
                  show_percentage: true
                  bold_text: false
                  entity: light.hallway_downstairs_light_ceiling
                  name: Ceiling
      - type: custom:streamline-card
        template: lights_popup_section
        variables:
          popup_hash: '#hallway-upstairs-lights'
          off_scene: scene.hallway_upstairs_off
          off_label: All off
          popup_cards:
            - type: custom:streamline-card
              template: section_title
              variables:
                title: Upstairs light
            - type: grid
              columns: 1
              square: false
              cards:
                - type: custom:material-slider-card
                  control_type: light
                  show_percentage: true
                  bold_text: false
                  entity: light.hallway_upstairs_light_ceiling
                  name: Ceiling
      - type: custom:streamline-card
        template: navbar_spacer
      - type: custom:streamline-card
        template: floating_navbar
        variables:
          active: rooms
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#hallway-settings'
        show_header: false
        cards:
          - type: custom:paper-buttons-row
            styles:
              justify-content: flex-start
              margin: 20px 12px 8px 12px
            buttons:
              - layout: name
                name: Hallway Settings
                styles:
                  name:
                    font-size: 22px
                    font-weight: 700
                    letter-spacing: -0.3px
                    color: var(--primary-text-color)
                  button:
                    padding: 0
                    background: none
          - type: custom:streamline-card
            template: presence_section
            variables:
              title: Presence — Downstairs
              occupied_entity: binary_sensor.hallway_downstairs_occupied
              pir_entity: binary_sensor.hallway_downstairs_sensor_motion_occupancy
              motion_enabled_entity: input_boolean.hallway_downstairs_sensor_motion_enabled
              override_entity: >-
                input_boolean.hallway_downstairs_automation_presence_override
              reason_1_entity: >-
                input_boolean.hallway_downstairs_automation_presence_override
              reason_1_state: 'on'
              reason_1_icon: m3of:person
              reason_1_label: Override active
          - type: custom:streamline-card
            template: presence_section
            variables:
              title: Presence — Upstairs
              occupied_entity: binary_sensor.hallway_upstairs_occupied
              pir_entity: binary_sensor.hallway_upstairs_sensor_motion_occupancy
              motion_enabled_entity: input_boolean.hallway_upstairs_sensor_motion_enabled
              override_entity: >-
                input_boolean.hallway_upstairs_automation_presence_override
              reason_1_entity: >-
                input_boolean.hallway_upstairs_automation_presence_override
              reason_1_state: 'on'
              reason_1_icon: m3of:person
              reason_1_label: Override active
          - type: custom:streamline-card
            template: lighting_automation_section_sleep_hold
            variables:
              title: Lighting automation — Downstairs
              toggle_entity: input_boolean.hallway_downstairs_automation_lights_enabled
          - type: custom:streamline-card
            template: lighting_automation_section_sleep_hold
            variables:
              title: Lighting automation — Upstairs
              toggle_entity: input_boolean.hallway_upstairs_automation_lights_enabled
          - type: custom:streamline-card
            template: heating_automation_section
            variables:
              title: Heating automation
              toggle_entity: >-
                input_boolean.hallway_downstairs_automation_heating_enabled
              heating_hold_entity: binary_sensor.hallway_downstairs_external_openings
