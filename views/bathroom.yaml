title: Bathroom
type: sections
max_columns: 1
path: bathroom
sections:
  - type: grid
    cards:
      - type: custom:streamline-card
        template: room_header_stack
        variables:
          navigation_path: /mobile-dashboard
          title: Bathroom
          room_motion_sensor: binary_sensor.bathroom_occupied
          room_climate_entity: climate.bathroom_trv
          room_temp_sensor: sensor.bathroom_sensor_climate_temperature
          popup_hash: '#bathroom-settings'
      - type: custom:streamline-card
        template: spacer_card
        variables:
          padding: 16px
      - type: custom:streamline-card
        template: room_tabs_scaffold
        variables:
          room_tab_cards:
            - type: custom:streamline-card
              template: lighting_scenes_section_2
              variables:
                title: Lighting
                scene_1_entity: scene.bathroom_full
                scene_1_name: Full
                scene_2_entity: scene.bathroom_low
                scene_2_name: Low
                scene_off_entity: scene.bathroom_off
                scene_off_name: 'Off'
                lights_group: group.bathroom_lights
                popup_hash: '#bathroom-lights'
                room: bathroom
          climate_tab_cards:
            - type: custom:streamline-card
              template: heating_mode_section
              variables:
                room: bathroom
                climate_entity: climate.bathroom_trv
                temp_sensor: sensor.bathroom_sensor_climate_temperature
                humidity_entity: sensor.bathroom_sensor_climate_humidity
  - type: grid
    cards:
      - type: custom:streamline-card
        template: lights_popup_scaffold
        variables:
          popup_hash: '#bathroom-lights'
          off_scene: scene.bathroom_off
          off_label: 'Off'
          title: Individual Lights
          icon: m3of:lightbulb
          popup_cards:
            - type: custom:streamline-card
              template: popup_light_section
              variables:
                title: Ceiling Light
                columns: 1
                cards:
                  - type: custom:streamline-card
                    template: popup_light_slider
                    variables:
                      entity: light.bathroom_light_ceiling
                      name: Ceiling
  - type: custom:streamline-card
    template: rooms_popup
  - type: custom:bubble-card
    card_type: pop-up
    hash: '#bathroom-settings'
    show_header: false
    cards:
      - type: custom:streamline-card
        template: popup_header
        variables:
          title: Bathroom Settings
      - type: custom:streamline-card
        template: presence_section
        variables:
          occupied_entity: binary_sensor.bathroom_occupied
          pir_entity: binary_sensor.bathroom_sensor_motion_occupancy
          motion_enabled_entity: input_boolean.bathroom_sensor_motion_enabled
          override_entity: input_boolean.bathroom_automation_presence_override
          contained_entity: binary_sensor.bathroom_occupied_contained
          reason_1_entity: binary_sensor.bathroom_occupied_contained
          reason_1_state: 'on'
          reason_1_icon: m3of:meeting-room
          reason_1_label: Doors closed
      - type: custom:streamline-card
        template: lighting_automation_section_sleep_hold
        variables:
          toggle_entity: input_boolean.bathroom_automation_lights_enabled
      - type: custom:streamline-card
        template: heating_automation_section
        variables:
          toggle_entity: input_boolean.bathroom_automation_heating_enabled
          heating_hold_entity: binary_sensor.bathroom_external_openings
  - type: custom:streamline-card
    template: page_footer
    variables:
      active: rooms
